<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropbox Chapter Link Generator | DTL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0061fe;
            --primary-hover: #004bb5;
            --success: #10b981;
            --success-bg: #d1fae5;
            --warning: #f59e0b;
            --warning-bg: #fef3c7;
            --error: #ef4444;
            --error-bg: #fee2e2;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --radius: 10px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            min-height: 100vh;
            color: var(--gray-800);
            line-height: 1.5;
        }

        .header {
            background: white;
            border-bottom: 1px solid var(--gray-200);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 20px;
            color: var(--gray-900);
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .staff-badge {
            background: var(--warning-bg);
            color: #92400e;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        .card {
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 24px;
            overflow: hidden;
        }

        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--gray-100);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card-header h2 { font-size: 16px; font-weight: 600; }

        .card-header .step {
            background: var(--primary);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
        }

        .card-body { padding: 24px; }

        .form-group { margin-bottom: 20px; }
        .form-group:last-child { margin-bottom: 0; }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--gray-700);
            margin-bottom: 8px;
        }

        .label-hint {
            font-weight: 400;
            color: var(--gray-500);
            font-size: 13px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            font-size: 15px;
            border: 2px solid var(--gray-200);
            border-radius: 8px;
            outline: none;
            transition: all 0.2s;
            font-family: inherit;
            background: white;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 97, 254, 0.1);
        }

        input::placeholder {
            color: var(--gray-400);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 28px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-family: inherit;
            width: 100%;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover { background: var(--primary-hover); }
        .btn-primary:disabled { background: var(--gray-300); cursor: not-allowed; }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover { background: #059669; }

        .status-bar {
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
        }

        .status-bar.loading { background: var(--gray-50); color: var(--gray-600); }
        .status-bar.success { background: var(--success-bg); color: #065f46; }
        .status-bar.error { background: var(--error-bg); color: #991b1b; }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid var(--gray-200);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .result-info {
            background: var(--gray-50);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
            font-size: 14px;
            color: var(--gray-600);
        }

        .result-info strong {
            color: var(--gray-800);
        }

        .split-notice {
            background: var(--warning-bg);
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #92400e;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            line-height: 1.5;
        }

        .split-notice-icon { flex-shrink: 0; font-size: 16px; }

        .part-block {
            margin-bottom: 24px;
            border: 2px solid var(--gray-200);
            border-radius: 10px;
            overflow: hidden;
        }

        .part-block-header {
            background: var(--gray-50);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--gray-200);
        }

        .part-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--gray-700);
        }

        .code-output {
            background: var(--gray-900);
            padding: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        .code-output pre {
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 12px;
            color: #e5e7eb;
            white-space: pre-wrap;
            word-break: break-all;
            margin: 0;
        }

        .part-actions {
            padding: 12px 16px;
            border-top: 1px solid var(--gray-200);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-copy-part {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-family: inherit;
            background: var(--success);
            color: white;
        }

        .btn-copy-part:hover { background: #059669; }

        .copy-confirm {
            font-size: 13px;
            color: var(--success);
            font-weight: 600;
            display: none;
            align-items: center;
            gap: 4px;
        }

        .copy-confirm.show { display: inline-flex; }

        .copy-all-btn {
            margin-bottom: 20px;
        }

        .preview-section {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--gray-200);
        }

        .preview-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--gray-500);
            margin-bottom: 12px;
        }

        .preview-box {
            border: 2px solid var(--gray-200);
            border-radius: 8px;
            padding: 16px;
            background: white;
        }

        .password-saved {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--success);
            margin-left: 8px;
        }

        @media (max-width: 640px) {
            .header-content { flex-direction: column; gap: 12px; }
        }

        .dtl-chapters { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .dtl-chapters-header {
            background: #f8f9fa;
            padding: 14px 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            border-radius: 6px;
            transition: background 0.2s;
            user-select: none;
        }
        .dtl-chapters-header:hover { background: #f0f0f0; }
        .dtl-chapters-arrow {
            transition: transform 0.2s;
            font-size: 12px;
            color: #666;
        }
        .dtl-chapters.open .dtl-chapters-arrow { transform: rotate(90deg); }
        .dtl-chapters-citation {
            font-weight: 600;
            font-size: 15px;
            color: #333;
        }
        .dtl-chapters-list {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }
        .dtl-chapters.open .dtl-chapters-list { max-height: 2000px; }
        .dtl-chapters-list ul {
            list-style: none;
            padding: 12px 0 12px 28px;
            margin: 0;
        }
        .dtl-chapters-list li { padding: 8px 0; }
        .dtl-chapters-list a:link,
        .dtl-chapters-list a:visited {
            color: #0061fe !important;
            text-decoration: none;
            font-size: 14px;
        }
        .dtl-chapters-list a:hover,
        .dtl-chapters-list a:active {
            color: #004bb5 !important;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">📚</div>
                <span>Dropbox Chapter Link Generator</span>
            </div>
            <div class="staff-badge">🔒 Staff Tool</div>
        </div>
    </header>

    <main class="container">
        <div class="card">
            <div class="card-header">
                <span class="step">1</span>
                <h2>Staff Authentication</h2>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label for="staffPassword">
                        Staff Password
                        <span id="passwordSaved" class="password-saved" style="display: none;">✓ Saved</span>
                    </label>
                    <input type="password" id="staffPassword" placeholder="Enter staff password">
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <span class="step">2</span>
                <h2>Book Information</h2>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label for="citation">Citation <span class="label-hint">(First Last, Book Title)</span></label>
                    <input type="text" id="citation" placeholder="John Smith, A History of Ancient Rome">
                </div>
                <div class="form-group">
                    <label for="dropboxUrl">Dropbox Link</label>
                    <input type="text" id="dropboxUrl" placeholder="https://www.dropbox.com/...">
                </div>

            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <button class="btn btn-primary" onclick="analyzePDF()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
                    </svg>
                    Generate Chapter Links
                </button>
            </div>
        </div>

        <div class="card" id="resultsCard" style="display: none;">
            <div class="card-header">
                <span class="step">✓</span>
                <h2>Ready to Copy</h2>
            </div>

            <div class="status-bar" id="statusBar" style="display: none;"></div>

            <div class="card-body" id="resultsBody">
                <div class="result-info" id="resultInfo"></div>
                <div id="splitNotice" class="split-notice" style="display: none;">
                    <span class="split-notice-icon">⚠️</span>
                    <span id="splitNoticeText"></span>
                </div>
                <div id="partsContainer"></div>

                <div class="preview-section">
                    <div class="preview-label">Preview (how it will look when all parts are pasted)</div>
                    <div class="preview-box" id="previewBox"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <script>
        const VIEWER_URL = "https://thedtl.github.io/chapter-pdf-reader-dropbox-lab/web/viewer.html";
        const WORKER_URL = "https://dtl-chapter-reader-dropbox-lab.reference-dfe.workers.dev";

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let generatedParts = [];

        document.addEventListener('DOMContentLoaded', () => {
            const savedPassword = sessionStorage.getItem('dtl_staff_password');
            if (savedPassword) {
                document.getElementById('staffPassword').value = savedPassword;
                document.getElementById('passwordSaved').style.display = 'inline-flex';
            }
        });

        document.getElementById('staffPassword').addEventListener('change', function() {
            if (this.value) {
                sessionStorage.setItem('dtl_staff_password', this.value);
                document.getElementById('passwordSaved').style.display = 'inline-flex';
            } else {
                sessionStorage.removeItem('dtl_staff_password');
                document.getElementById('passwordSaved').style.display = 'none';
            }
        });

        function showStatus(message, type = 'loading') {
            const card = document.getElementById('resultsCard');
            const bar = document.getElementById('statusBar');
            const body = document.getElementById('resultsBody');

            card.style.display = 'block';
            bar.style.display = 'flex';
            bar.className = 'status-bar ' + type;
            body.style.display = type === 'loading' ? 'none' : 'block';

            if (type === 'loading') {
                bar.innerHTML = '<div class="spinner"></div><span>' + message + '</span>';
            } else if (type === 'error') {
                bar.innerHTML = '<span>❌</span><span>' + message + '</span>';
            } else if (type === 'success') {
                bar.style.display = 'none';
            }

            card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        async function analyzePDF() {
            const staffPassword = document.getElementById('staffPassword').value;
            const citation = document.getElementById('citation').value.trim();
            const dropboxUrl = document.getElementById('dropboxUrl').value.trim();

            if (!staffPassword) {
                showStatus('Please enter the staff password', 'error');
                document.getElementById('staffPassword').focus();
                return;
            }

            if (!citation) {
                showStatus('Please enter the book citation', 'error');
                document.getElementById('citation').focus();
                return;
            }

            if (!dropboxUrl) {
                showStatus('Please enter a Dropbox URL', 'error');
                document.getElementById('dropboxUrl').focus();
                return;
            }

            if (!dropboxUrl.includes('dropbox.com')) {
                showStatus("This doesn't look like a Dropbox URL", 'error');
                return;
            }

            showStatus('Loading PDF and extracting chapters...');

            try {
                const analyzeUrl = WORKER_URL + '/analyze?' + new URLSearchParams({
                    password: staffPassword,
                    dropbox: dropboxUrl
                });

                const pdf = await pdfjsLib.getDocument({ url: analyzeUrl }).promise;
                const totalPages = pdf.numPages;

                showStatus('Extracting bookmarks...');

                const outline = await pdf.getOutline();

                if (!outline || outline.length === 0) {
                    showStatus('No bookmarks found in this PDF. Please add bookmarks to the PDF first, then try again.', 'error');
                    return;
                }

                const chapters = await extractChapters(pdf, outline, totalPages);

                if (chapters.length === 0) {
                    showStatus('Could not extract chapter information from bookmarks.', 'error');
                    return;
                }

                showStatus('Generating secure chapter links...');

                const signResponse = await fetch(WORKER_URL + '/batch-sign', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        password: staffPassword,
                        dropbox: dropboxUrl,
                        chapters: chapters.map(ch => ({
                            title: ch.title,
                            start: ch.start,
                            end: ch.end
                        })),
                        download: false
                    })
                });

                const signData = await signResponse.json();

                if (signData.error) {
                    throw new Error(signData.error);
                }

                generateOutput(citation, chapters, signData.tokens, totalPages);

            } catch (error) {
                console.error('Error:', error);
                if (error.message.includes('fetch')) {
                    showStatus('Network error. Please check your connection and try again.', 'error');
                } else {
                    showStatus('Error: ' + error.message, 'error');
                }
            }
        }

        async function extractChapters(pdf, outline, totalPages) {
            const chapters = [];

            for (let i = 0; i < outline.length; i++) {
                const item = outline[i];
                const nextItem = outline[i + 1];

                try {
                    let startPage = await getPageNumber(pdf, item);
                    if (startPage === null) continue;

                    let endPage;
                    if (nextItem) {
                        const nextStart = await getPageNumber(pdf, nextItem);
                        endPage = nextStart !== null ? nextStart - 1 : totalPages;
                    } else {
                        endPage = totalPages;
                    }

                    if (endPage < startPage) endPage = startPage;

                    chapters.push({
                        title: item.title.trim(),
                        start: startPage,
                        end: endPage
                    });
                } catch (e) {
                    console.warn('Could not process bookmark:', item.title, e);
                }
            }

            return chapters;
        }

        async function getPageNumber(pdf, item) {
            try {
                let dest = item.dest;
                if (typeof dest === 'string') {
                    dest = await pdf.getDestination(dest);
                }
                if (!dest || !Array.isArray(dest)) return null;
                const pageIndex = await pdf.getPageIndex(dest[0]);
                return pageIndex + 1;
            } catch (e) {
                return null;
            }
        }

        function getChapterUrl(token) {
            const workerUrl = WORKER_URL + '?token=' + encodeURIComponent(token);
            return VIEWER_URL + '?file=' + encodeURIComponent(workerUrl);
        }

        /* ── Shared CSS block (only in Part 1) ── */
        function buildStyleBlock(citation) {
            return `<!-- ${escapeHtml(citation)} - Chapter Links -->
<style>
.dtl-chapters { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
.dtl-chapters-header { background: #f8f9fa; padding: 14px 18px; cursor: pointer; display: flex; align-items: center; gap: 10px; border-radius: 6px; transition: background 0.2s; user-select: none; }
.dtl-chapters-header:hover { background: #f0f0f0; }
.dtl-chapters-arrow { transition: transform 0.2s; font-size: 12px; color: #666; }
.dtl-chapters.open .dtl-chapters-arrow { transform: rotate(90deg); }
.dtl-chapters-citation { font-weight: 600; font-size: 15px; color: #333; }
.dtl-chapters-list { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
.dtl-chapters.open .dtl-chapters-list { max-height: 2000px; }
.dtl-chapters-list ul { list-style: none; padding: 12px 0 12px 28px; margin: 0; }
.dtl-chapters-list li { padding: 8px 0; }
.dtl-chapter-button {
  appearance: none;
  -webkit-appearance: none;
  background: transparent;
  border: 0;
  color: #0061fe !important;
  cursor: pointer;
  display: inline;
  font: inherit;
  font-size: 14px;
  padding: 0;
  text-align: left;
}
.dtl-chapter-button:visited {
  color: #0061fe !important;
}
.dtl-chapter-button:hover,
.dtl-chapter-button:active,
.dtl-chapter-button:focus {
  color: #004bb5 !important;
  text-decoration: none;
}
.dtl-chapter-button:focus { outline: 2px solid #99c2ff; outline-offset: 2px; }
</style>`;
        }

        function buildWrapperOpen(citation, partNum, totalParts) {
            const suffix = totalParts > 1 ? ` (Part ${partNum} of ${totalParts})` : '';
            return `
<div class="dtl-chapters open">
  <div class="dtl-chapters-header" onclick="this.parentElement.classList.toggle('open')" tabindex="0" onkeydown="if(event.key==='Enter' || event.key===' ') { event.preventDefault(); this.click(); }">
    <span class="dtl-chapters-arrow">▶</span>
    <span class="dtl-chapters-citation">${escapeHtml(citation)}${suffix}</span>
  </div>
  <div class="dtl-chapters-list">
    <ul>
`;
        }

        const WRAPPER_CLOSE = `    </ul>
  </div>
</div>
<script>
function dtlOpenChapter(button) {
  var url = button && button.getAttribute("data-dtl-url");
  if (!url) return;
  window.location.replace(url);
}
<\/script>`;

        function buildLiHtml(ch, token) {
            const url = getChapterUrl(token);
            return `      <li><button type="button" class="dtl-chapter-button" data-dtl-url="${escapeAttribute(url)}" onclick="dtlOpenChapter(this)" oncontextmenu="return false;">${escapeHtml(ch.title)}</button></li>\n`;
        }

        /* ── Split chapters into parts of CHAPTERS_PER_PART each ── */
        const CHAPTERS_PER_PART = 30;

        function splitIntoParts(citation, chapters, tokens) {
            const liStrings = chapters.map((ch, i) => buildLiHtml(ch, tokens[i].token));
            const styleBlock = buildStyleBlock(citation);
            const totalParts = Math.ceil(chapters.length / CHAPTERS_PER_PART);

            const parts = [];
            for (let p = 0; p < totalParts; p++) {
                const start = p * CHAPTERS_PER_PART;
                const end = Math.min(start + CHAPTERS_PER_PART, chapters.length);

                let html = styleBlock + '\n';
                html += buildWrapperOpen(citation, p + 1, totalParts);
                for (let i = start; i < end; i++) {
                    html += liStrings[i];
                }
                html += WRAPPER_CLOSE;

                parts.push({
                    html,
                    chapterCount: end - start,
                    partNumber: p + 1
                });
            }

            return parts;
        }

        function generateOutput(citation, chapters, tokens, totalPages) {
            const parts = splitIntoParts(citation, chapters, tokens);
            generatedParts = parts;

            // Result info
            document.getElementById('resultInfo').innerHTML =
                '<strong>' + chapters.length + ' chapters</strong> extracted from a ' + totalPages + '-page PDF';

            // Split notice
            const notice = document.getElementById('splitNotice');
            if (parts.length > 1) {
                notice.style.display = 'flex';
                document.getElementById('splitNoticeText').innerHTML =
                    'Output was split into <strong>' + parts.length + ' parts</strong> (' +
                    CHAPTERS_PER_PART + ' chapters each). ' +
                    'Paste each part into a <strong>separate HTML box</strong> on the same page, in order.';
            } else {
                notice.style.display = 'none';
            }

            // Build part blocks
            const container = document.getElementById('partsContainer');
            container.innerHTML = '';

            parts.forEach((part, i) => {
                const block = document.createElement('div');
                block.className = 'part-block';
                block.innerHTML = `
                    <div class="part-block-header">
                        <span class="part-label">${parts.length === 1 ? 'HTML Output' : 'Part ' + part.partNumber + ' of ' + parts.length + ' — ' + part.chapterCount + ' chapters'}</span>
                    </div>
                    <div class="code-output">
                        <pre></pre>
                    </div>
                    <div class="part-actions">
                        <button class="btn-copy-part" onclick="copyPart(${i})">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                            Copy${parts.length > 1 ? ' Part ' + part.partNumber : ''}
                        </button>
                        <span class="copy-confirm" id="copyConfirm${i}">✓ Copied!</span>
                    </div>
                `;
                // Set code text safely (textContent, not innerHTML)
                block.querySelector('pre').textContent = part.html;
                container.appendChild(block);
            });

            // Preview: combine all parts
            const fullHtml = parts.map(p => p.html).join('\n');
            document.getElementById('previewBox').innerHTML = fullHtml;

            showStatus('', 'success');
            document.getElementById('resultsBody').style.display = 'block';
        }

        function copyPart(index) {
            const code = generatedParts[index].html;
            navigator.clipboard.writeText(code).then(() => {
                showCopyConfirm(index);
            }).catch(() => {
                // Fallback
                const textarea = document.createElement('textarea');
                textarea.value = code;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showCopyConfirm(index);
            });
        }

        function showCopyConfirm(index) {
            const el = document.getElementById('copyConfirm' + index);
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 2500);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function escapeAttribute(text) {
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/"/g, '&quot;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        document.getElementById('staffPassword').addEventListener('keypress', e => {
            if (e.key === 'Enter') document.getElementById('citation').focus();
        });

        document.getElementById('citation').addEventListener('keypress', e => {
            if (e.key === 'Enter') document.getElementById('dropboxUrl').focus();
        });

        document.getElementById('dropboxUrl').addEventListener('keypress', e => {
            if (e.key === 'Enter') analyzePDF();
        });
    </script>
</body>
</html>
