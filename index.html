<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropbox Chapter Link Generator | DTL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0061fe;
            --primary-hover: #004bb5;
            --success: #10b981;
            --success-bg: #d1fae5;
            --warning: #f59e0b;
            --warning-bg: #fef3c7;
            --error: #ef4444;
            --error-bg: #fee2e2;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --radius: 10px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            min-height: 100vh;
            color: var(--gray-800);
            line-height: 1.5;
        }

        .header {
            background: white;
            border-bottom: 1px solid var(--gray-200);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 20px;
            color: var(--gray-900);
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .staff-badge {
            background: var(--warning-bg);
            color: #92400e;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        .card {
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 24px;
            overflow: hidden;
        }

        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--gray-100);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card-header h2 { font-size: 16px; font-weight: 600; }

        .card-header .step {
            background: var(--primary);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
        }

        .card-body { padding: 24px; }

        .form-group { margin-bottom: 20px; }
        .form-group:last-child { margin-bottom: 0; }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--gray-700);
            margin-bottom: 8px;
        }

        .label-hint {
            font-weight: 400;
            color: var(--gray-500);
            font-size: 13px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            font-size: 15px;
            border: 2px solid var(--gray-200);
            border-radius: 8px;
            outline: none;
            transition: all 0.2s;
            font-family: inherit;
            background: white;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 97, 254, 0.1);
        }

        input::placeholder {
            color: var(--gray-400);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 28px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-family: inherit;
            width: 100%;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover { background: var(--primary-hover); }
        .btn-primary:disabled { background: var(--gray-300); cursor: not-allowed; }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover { background: #059669; }

        .field-note {
            display: none;
            margin-top: 8px;
            font-size: 13px;
            color: var(--gray-600);
        }

        .field-note.error { color: var(--error); }
        .field-note.success { color: var(--success); }

        .metadata-label-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 8px;
        }

        .metadata-label-row label {
            margin-bottom: 0;
        }

        .btn-copy-field {
            flex: 0 0 auto;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--gray-300);
            font-family: inherit;
            background: white;
            color: var(--gray-700);
        }

        .btn-copy-field:hover {
            background: var(--gray-50);
            border-color: var(--gray-400);
        }

        .status-bar {
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
        }

        .status-bar.loading { background: var(--gray-50); color: var(--gray-600); }
        .status-bar.success { background: var(--success-bg); color: #065f46; }
        .status-bar.error { background: var(--error-bg); color: #991b1b; }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid var(--gray-200);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .result-info {
            background: var(--gray-50);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
            font-size: 14px;
            color: var(--gray-600);
        }

        .result-info strong {
            color: var(--gray-800);
        }

        .split-notice {
            background: var(--warning-bg);
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #92400e;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            line-height: 1.5;
        }

        .split-notice-icon { flex-shrink: 0; font-size: 16px; }

        .part-block {
            margin-bottom: 24px;
            border: 2px solid var(--gray-200);
            border-radius: 10px;
            overflow: hidden;
        }

        .part-block-header {
            background: var(--gray-50);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--gray-200);
        }

        .part-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--gray-700);
        }

        .code-output {
            background: var(--gray-900);
            padding: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        .code-output pre {
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 12px;
            color: #e5e7eb;
            white-space: pre-wrap;
            word-break: break-all;
            margin: 0;
        }

        .part-actions {
            padding: 12px 16px;
            border-top: 1px solid var(--gray-200);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-copy-part {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-family: inherit;
            background: var(--success);
            color: white;
        }

        .btn-copy-part:hover { background: #059669; }

        .copy-confirm {
            font-size: 13px;
            color: var(--success);
            font-weight: 600;
            display: none;
            align-items: center;
            gap: 4px;
        }

        .copy-confirm.show { display: inline-flex; }

        .copy-all-btn {
            margin-bottom: 20px;
        }

        .preview-section {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--gray-200);
        }

        .preview-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--gray-500);
            margin-bottom: 12px;
        }

        .preview-box {
            border: 2px solid var(--gray-200);
            border-radius: 8px;
            padding: 16px;
            background: white;
        }

        .password-saved {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--success);
            margin-left: 8px;
        }

        @media (max-width: 640px) {
            .header-content { flex-direction: column; gap: 12px; }
        }

        .dtl-chapters { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .dtl-chapters-header {
            background: #f8f9fa;
            padding: 14px 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            border-radius: 6px;
            transition: background 0.2s;
            user-select: none;
        }
        .dtl-chapters-header:hover { background: #f0f0f0; }
        .dtl-chapters-arrow {
            transition: transform 0.2s;
            font-size: 12px;
            color: #666;
        }
        .dtl-chapters.open .dtl-chapters-arrow { transform: rotate(90deg); }
        .dtl-chapters-citation {
            font-weight: 600;
            font-size: 15px;
            color: #333;
        }
        .dtl-chapters-list {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }
        .dtl-chapters.open .dtl-chapters-list { max-height: 2000px; }
        .dtl-chapters-list ul {
            list-style: none;
            padding: 12px 0 12px 28px;
            margin: 0;
        }
        .dtl-chapters-list li { padding: 8px 0; }
        .dtl-chapters-list a:link,
        .dtl-chapters-list a:visited {
            color: #0061fe !important;
            text-decoration: none;
            font-size: 14px;
        }
        .dtl-chapters-list a:hover,
        .dtl-chapters-list a:active {
            color: #004bb5 !important;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">📚</div>
                <span>Dropbox Chapter Link Generator</span>
            </div>
            <div class="staff-badge">🔒 Staff Tool</div>
        </div>
    </header>

    <main class="container">
        <div class="card">
            <div class="card-header">
                <span class="step">1</span>
                <h2>Staff Authentication</h2>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label for="staffPassword">
                        Staff Password
                        <span id="passwordSaved" class="password-saved" style="display: none;">✓ Saved</span>
                    </label>
                    <input type="password" id="staffPassword" placeholder="Enter staff password">
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <span class="step">2</span>
                <h2>Book Information</h2>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label for="dropboxUrl">Dropbox Link</label>
                    <input type="text" id="dropboxUrl" placeholder="https://www.dropbox.com/...">
                </div>
                <div class="form-group">
                    <div class="metadata-label-row">
                        <label for="citation">Citation <span class="label-hint">(Chicago-style bibliography entry)</span></label>
                        <button type="button" class="btn-copy-field" onclick="copyMetadataField('citation', this)">Copy</button>
                    </div>
                    <input type="text" id="citation" placeholder="Leave blank to fill from the PDF, or type your own citation">
                    <div id="citationSuggestionNote" class="field-note"></div>
                </div>
                <div class="form-group">
                    <div class="metadata-label-row">
                        <label for="footnoteCitation">Chicago Footnote Style</label>
                        <button type="button" class="btn-copy-field" onclick="copyMetadataField('footnoteCitation', this)">Copy</button>
                    </div>
                    <input type="text" id="footnoteCitation" placeholder="Auto-filled from the bibliography entry">
                </div>
                <div class="form-group">
                    <div class="metadata-label-row">
                        <label for="shortCitation">Short Display Line</label>
                        <button type="button" class="btn-copy-field" onclick="copyMetadataField('shortCitation', this)">Copy</button>
                    </div>
                    <input type="text" id="shortCitation" placeholder="Auto-filled from the bibliography entry">
                    <div class="field-note" style="display: block;">Only the bibliography entry is used in the generated HTML. The other lines are for copy/paste.</div>
                </div>

            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <button class="btn btn-primary" onclick="analyzePDF()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
                    </svg>
                    Generate Chapter Links
                </button>
            </div>
        </div>

        <div class="card" id="resultsCard" style="display: none;">
            <div class="card-header">
                <span class="step">✓</span>
                <h2>Ready to Copy</h2>
            </div>

            <div class="status-bar" id="statusBar" style="display: none;"></div>

            <div class="card-body" id="resultsBody">
                <div class="result-info" id="resultInfo"></div>
                <div id="splitNotice" class="split-notice" style="display: none;">
                    <span class="split-notice-icon">⚠️</span>
                    <span id="splitNoticeText"></span>
                </div>
                <div id="partsContainer"></div>

                <div class="preview-section">
                    <div class="preview-label">Preview (how it will look when all parts are pasted)</div>
                    <div class="preview-box" id="previewBox"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <script>
        const VIEWER_URL = "https://thedtl.github.io/reader/web/viewer.html";
        const WORKER_URL = "https://dtl-chapter-reader-dropbox-lab.reference-dfe.workers.dev";

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let generatedParts = [];
        const FALLBACK_CITATION = 'Citation needed';

        document.addEventListener('DOMContentLoaded', () => {
            const savedPassword = sessionStorage.getItem('dtl_staff_password');
            if (savedPassword) {
                document.getElementById('staffPassword').value = savedPassword;
                document.getElementById('passwordSaved').style.display = 'inline-flex';
            }
        });

        document.getElementById('staffPassword').addEventListener('change', function() {
            if (this.value) {
                sessionStorage.setItem('dtl_staff_password', this.value);
                document.getElementById('passwordSaved').style.display = 'inline-flex';
            } else {
                sessionStorage.removeItem('dtl_staff_password');
                document.getElementById('passwordSaved').style.display = 'none';
            }
        });

        function showCitationNote(message, type = '') {
            const note = document.getElementById('citationSuggestionNote');
            note.textContent = message;
            note.className = 'field-note' + (type ? ' ' + type : '');
            note.style.display = message ? 'block' : 'none';
        }

        function showStatus(message, type = 'loading') {
            const card = document.getElementById('resultsCard');
            const bar = document.getElementById('statusBar');
            const body = document.getElementById('resultsBody');

            card.style.display = 'block';
            bar.style.display = 'flex';
            bar.className = 'status-bar ' + type;
            body.style.display = type === 'loading' ? 'none' : 'block';

            if (type === 'loading') {
                bar.innerHTML = '<div class="spinner"></div><span>' + message + '</span>';
            } else if (type === 'error') {
                bar.innerHTML = '<span>❌</span><span>' + message + '</span>';
            } else if (type === 'success') {
                bar.style.display = 'none';
            }

            card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        async function requestHeadingSuggestion(staffPassword, lines, images) {
            try {
                const response = await fetch(WORKER_URL + '/suggest-heading', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        password: staffPassword,
                        lines,
                        images
                    })
                });

                const data = await response.json();
                if (!response.ok || data.error) {
                    throw new Error(data.error || 'Worker heading suggestion failed');
                }

                return {
                    heading: String(data.heading || '').trim(),
                    source: data.source || 'worker',
                    note: data.note || ''
                };
            } catch (error) {
                console.warn('Worker heading suggestion unavailable; using browser fallback.', error);
                return { heading: '', source: 'fallback', note: '' };
            }
        }

        async function fillCitationFromPdfIfNeeded(pdf, staffPassword) {
            const citationInput = document.getElementById('citation');
            if (citationInput.value.trim()) {
                const citation = normalizeBibliographyCitation(citationInput.value.trim());
                citationInput.value = citation;
                fillDerivedCitationFields(citation);
                showCitationNote('');
                return citation;
            }

            showStatus('Reading PDF front matter for citation...');
            showCitationNote('Reading the first pages and filling the citation...');

            try {
                const lines = await extractFrontMatterLines(pdf, 8);
                const images = await renderFrontMatterImages(pdf, 8);
                const workerSuggestion = await requestHeadingSuggestion(staffPassword, lines, images);
                const suggestion = workerSuggestion.heading || buildCitationSuggestion(lines);

                if (suggestion) {
                    const citation = normalizeBibliographyCitation(suggestion);
                    citationInput.value = citation;
                    fillDerivedCitationFields(citation);
                    showCitationNote('Citation filled from PDF. Please review it in the generated preview.', 'success');
                    return citation;
                }

                console.warn('No clear citation found:', workerSuggestion.note || 'No suggestion returned');
            } catch (error) {
                console.warn('Citation extraction error:', error);
            }

            showCitationNote('Could not auto-fill a clear citation. Code generated anyway; edit the metadata lines and generate again if needed.', 'error');
            const fallbackCitation = normalizeBibliographyCitation(citationInput.value.trim()) || FALLBACK_CITATION;
            citationInput.value = fallbackCitation;
            return fallbackCitation;
        }

        async function analyzePDF() {
            const staffPassword = document.getElementById('staffPassword').value;
            let citation = document.getElementById('citation').value.trim();
            const dropboxUrl = document.getElementById('dropboxUrl').value.trim();

            if (!staffPassword) {
                showStatus('Please enter the staff password', 'error');
                document.getElementById('staffPassword').focus();
                return;
            }

            if (!dropboxUrl) {
                showStatus('Please enter a Dropbox URL', 'error');
                document.getElementById('dropboxUrl').focus();
                return;
            }

            if (!dropboxUrl.includes('dropbox.com')) {
                showStatus("This doesn't look like a Dropbox URL", 'error');
                return;
            }

            showStatus('Loading PDF and extracting chapters...');

            try {
                const analyzeUrl = WORKER_URL + '/analyze?' + new URLSearchParams({
                    password: staffPassword,
                    dropbox: dropboxUrl
                });

                const pdf = await pdfjsLib.getDocument({ url: analyzeUrl }).promise;
                const totalPages = pdf.numPages;
                citation = await fillCitationFromPdfIfNeeded(pdf, staffPassword);

                showStatus('Extracting bookmarks...');

                const outline = await pdf.getOutline();

                if (!outline || outline.length === 0) {
                    showStatus('No bookmarks found in this PDF. Please add bookmarks to the PDF first, then try again.', 'error');
                    return;
                }

                const chapters = await extractChapters(pdf, outline, totalPages);

                if (chapters.length === 0) {
                    showStatus('Could not extract chapter information from bookmarks.', 'error');
                    return;
                }

                showStatus('Generating secure chapter links...');

                const signResponse = await fetch(WORKER_URL + '/batch-sign', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        password: staffPassword,
                        dropbox: dropboxUrl,
                        chapters: chapters.map(ch => ({
                            title: ch.title,
                            start: ch.start,
                            end: ch.end
                        })),
                        download: false
                    })
                });

                const signData = await signResponse.json();

                if (signData.error) {
                    throw new Error(signData.error);
                }

                generateOutput(citation, chapters, signData.tokens, totalPages);

            } catch (error) {
                console.error('Error:', error);
                if (error.message.includes('fetch')) {
                    showStatus('Network error. Please check your connection and try again.', 'error');
                } else {
                    showStatus('Error: ' + error.message, 'error');
                }
            }
        }

        async function extractChapters(pdf, outline, totalPages) {
            const chapters = [];

            for (let i = 0; i < outline.length; i++) {
                const item = outline[i];
                const nextItem = outline[i + 1];

                try {
                    let startPage = await getPageNumber(pdf, item);
                    if (startPage === null) continue;

                    let endPage;
                    if (nextItem) {
                        const nextStart = await getPageNumber(pdf, nextItem);
                        endPage = nextStart !== null ? nextStart - 1 : totalPages;
                    } else {
                        endPage = totalPages;
                    }

                    if (endPage < startPage) endPage = startPage;

                    chapters.push({
                        title: item.title.trim(),
                        start: startPage,
                        end: endPage
                    });
                } catch (e) {
                    console.warn('Could not process bookmark:', item.title, e);
                }
            }

            return chapters;
        }

        async function extractFrontMatterLines(pdf, maxPages) {
            const pageLimit = Math.min(pdf.numPages, maxPages);
            const lines = [];

            for (let pageNumber = 1; pageNumber <= pageLimit; pageNumber++) {
                const page = await pdf.getPage(pageNumber);
                const content = await page.getTextContent();
                lines.push(...groupTextItemsIntoLines(content.items, pageNumber));
            }

            return lines;
        }

        async function renderFrontMatterImages(pdf, maxPages) {
            const pageLimit = Math.min(pdf.numPages, maxPages);
            const images = [];

            for (let pageNumber = 1; pageNumber <= pageLimit; pageNumber++) {
                const page = await pdf.getPage(pageNumber);
                const viewport = page.getViewport({ scale: 1.35 });
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d', { alpha: false });
                canvas.width = Math.floor(viewport.width);
                canvas.height = Math.floor(viewport.height);

                await page.render({ canvasContext: context, viewport }).promise;

                const dataUrl = canvas.toDataURL('image/jpeg', 0.74);
                images.push({
                    pageNumber,
                    mimeType: 'image/jpeg',
                    data: dataUrl.replace(/^data:image\/jpeg;base64,/, '')
                });
            }

            return images;
        }

        function groupTextItemsIntoLines(items, pageNumber) {
            const rows = new Map();

            items.forEach(item => {
                const raw = String(item.str || '').trim();
                if (!raw) return;

                const transform = item.transform || [];
                const x = Number(transform[4] || 0);
                const y = Number(transform[5] || 0);
                const fontSize = Math.abs(Number(transform[0] || item.height || 0));
                const key = Math.round(y / 3) * 3;

                if (!rows.has(key)) {
                    rows.set(key, []);
                }

                rows.get(key).push({ text: raw, x, fontSize });
            });

            return [...rows.entries()]
                .sort((a, b) => b[0] - a[0])
                .map(([, parts]) => {
                    const sorted = parts.sort((a, b) => a.x - b.x);
                    const text = cleanFrontMatterLine(sorted.map(part => part.text).join(' '));
                    const maxFontSize = Math.max(...sorted.map(part => part.fontSize || 0));
                    return { text, pageNumber, fontSize: maxFontSize };
                })
                .filter(line => line.text);
        }

        function buildCitationSuggestion(lines) {
            const sourceLines = lines
                .map((line, index) => ({ ...line, index }))
                .filter(line => cleanFrontMatterLine(line.text));
            const candidates = sourceLines
                .filter(line => isUsefulFrontMatterLine(line.text));

            if (candidates.length === 0) {
                return '';
            }

            const title = chooseTitleLine(candidates);
            const author = title ? chooseAuthorLine(candidates, title.index) : '';
            const responsibility = title ? chooseResponsibilityStatement(candidates, title.index) : '';
            const series = title ? chooseSeriesStatement(candidates, title.index) : '';
            const edition = title ? chooseEditionStatement(candidates, title.index) : '';
            const publication = choosePublicationStatement(sourceLines);
            const details = [responsibility, series, edition, publication].filter(Boolean).join('. ');
            const titleText = title ? collectTitleText(candidates, title) : '';

            if (author && title) {
                return formatChicagoCitation(author, titleText, '', details);
            }

            if (title) {
                return formatChicagoCitation('', titleText, '', details);
            }

            return plainCitationText(candidates[0].text);
        }

        function chooseTitleLine(candidates) {
            const maxFontSize = Math.max(...candidates.map(line => line.fontSize || 0));
            const scored = candidates.map(line => ({
                ...line,
                score: scoreTitleCandidate(line, maxFontSize)
            }));

            scored.sort((a, b) => b.score - a.score);
            return scored[0] && scored[0].score > 0 ? scored[0] : null;
        }

        function collectTitleText(candidates, title) {
            const titleLines = [title];
            collectAdjacentTitleLines(candidates, title, -1)
                .reverse()
                .forEach(line => titleLines.unshift(line));
            collectAdjacentTitleLines(candidates, title, 1)
                .forEach(line => titleLines.push(line));

            const subtitleIndex = titleLines.findIndex((line, index) => index > 0 && looksLikeSubtitleLine(line.text));
            if (subtitleIndex > 0) {
                const mainTitle = formatCitationTitle(titleLines.slice(0, subtitleIndex).map(line => line.text).join(' '));
                const subtitle = formatCitationTitle(titleLines.slice(subtitleIndex).map(line => line.text).join(' '));
                return cleanCitationText(`${mainTitle}: ${subtitle}`);
            }

            return formatCitationTitle(titleLines.map(line => line.text).join(' '));
        }

        function collectAdjacentTitleLines(candidates, title, direction) {
            const lines = [];
            let nextIndex = title.index + direction;

            while (lines.length < 3) {
                const next = candidates.find(line => line.index === nextIndex);
                if (!next || !isTitleContinuationLine(next, title, direction)) {
                    break;
                }

                lines.push(next);
                nextIndex += direction;
            }

            return lines;
        }

        function isTitleContinuationLine(line, title, direction = 1) {
            const text = cleanFrontMatterLine(line.text);
            const wordCount = text.split(/\s+/).length;
            if (!text || wordCount > 9) return false;
            if (line.pageNumber !== title.pageNumber) return false;
            if (title.fontSize && line.fontSize && line.fontSize < title.fontSize * 0.72) {
                if (!(direction > 0 && line.fontSize >= title.fontSize * 0.45 && looksLikeSubtitleLine(text))) {
                    return false;
                }
            }
            if (/^(by|par)$/i.test(text)) return false;
            if (looksLikeSeriesLine(text)) return false;
            if (looksLikeEditionLine(text)) return false;
            if (looksLikeResponsibilityRoleLine(text)) return false;
            if (looksLikeSubtitleLine(text)) return true;
            if (looksLikeAuthorLine(text) && !(isMostlyAllCaps(text) && title.fontSize && line.fontSize >= title.fontSize * 0.72)) return false;
            return scoreTitleCandidate(line) > 0;
        }

        function chooseAuthorLine(candidates, titleIndex) {
            const title = candidates.find(line => line.index === titleIndex);
            const titleLineIndexes = getTitleLineIndexes(candidates, title);
            const authorBeforeTitle = candidates
                .filter(line => (
                    line.index < titleIndex &&
                    line.index >= titleIndex - 6 &&
                    !titleLineIndexes.has(line.index) &&
                    looksLikeAuthorLine(line.text) &&
                    !looksLikeSeriesLine(line.text)
                ))
                .sort((a, b) => b.index - a.index);

            if (authorBeforeTitle.length > 0) {
                return collectAuthorText(candidates, authorBeforeTitle[0]);
            }

            const authorWindow = candidates.filter(line => (
                line.index > titleIndex &&
                line.index <= titleIndex + 6 &&
                !titleLineIndexes.has(line.index) &&
                looksLikeAuthorLine(line.text)
            ));

            if (authorWindow.length === 0) {
                return '';
            }

            return collectAuthorText(candidates, authorWindow[0]);
        }

        function getTitleLineIndexes(candidates, title) {
            if (!title) return new Set();
            return new Set([
                title.index,
                ...collectAdjacentTitleLines(candidates, title, -1).map(line => line.index),
                ...collectAdjacentTitleLines(candidates, title, 1).map(line => line.index)
            ]);
        }

        function collectAuthorText(candidates, firstAuthorLine) {
            const lines = [firstAuthorLine];
            let nextIndex = firstAuthorLine.index + 1;

            while (lines.length < 4) {
                const next = candidates.find(line => line.index === nextIndex);
                if (!next || !looksLikeAuthorLine(next.text)) break;
                lines.push(next);
                nextIndex += 1;
            }

            return cleanAuthorLine(lines.map(line => trimTerminalPunctuation(line.text)).join(', '));
        }

        function chooseResponsibilityStatement(candidates, titleIndex) {
            const window = candidates.filter(line => (
                line.index > titleIndex &&
                line.index <= titleIndex + 18
            ));

            const direct = window.find(line => looksLikeDirectResponsibilityLine(line.text));
            if (direct) {
                return normalizeResponsibilityStatement(direct.text);
            }

            const byIndex = window.findIndex(line => /^(by|par)$/i.test(cleanFrontMatterLine(line.text)));
            if (byIndex <= 0 || byIndex >= window.length - 1) {
                return '';
            }

            const roleLines = window
                .slice(Math.max(0, byIndex - 6), byIndex)
                .filter(line => looksLikeResponsibilityRoleLine(line.text))
                .map(line => line.text);
            const name = normalizeContributorName(window[byIndex + 1].text);

            if (roleLines.length === 0 || !looksLikeContributorName(name)) {
                return '';
            }

            const connector = /^par$/i.test(cleanFrontMatterLine(window[byIndex].text)) ? 'par' : 'by';
            return cleanCitationText(`${formatResponsibilityRoles(roleLines)} ${connector} ${name}`);
        }

        function chooseSeriesStatement(candidates, titleIndex) {
            const window = candidates.filter(line => (
                line.index >= titleIndex - 8 &&
                line.index <= titleIndex + 8 &&
                looksLikeSeriesLine(line.text)
            ));
            if (window.length === 0) return '';

            const seriesLine = window.find(line => /\bseries\b|sources?\s+chr[ée]tiennes?/i.test(line.text));
            const numberLine = window.find(line => /^(volume|vol\.?|n[°o]|no\.?)\b/i.test(cleanFrontMatterLine(line.text)));

            if (seriesLine && numberLine && seriesLine !== numberLine) {
                return cleanCitationText(`${formatSeriesLine(seriesLine.text)}, ${formatSeriesLine(numberLine.text)}`);
            }

            return formatSeriesLine((seriesLine || numberLine || window[0]).text);
        }

        function chooseEditionStatement(candidates, titleIndex) {
            const edition = candidates.find(line => (
                line.index > titleIndex &&
                line.index <= titleIndex + 10 &&
                looksLikeEditionLine(line.text)
            ));
            return edition ? sentenceCaseText(edition.text) : '';
        }

        function formatSeriesLine(text) {
            const cleaned = cleanFrontMatterLine(text)
                .replace(/^n[°o]\s*/i, '')
                .replace(/^no\.?\s*/i, '')
                .replace(/^volume\s+/i, 'volume ')
                .replace(/^vol\.?\s+/i, 'volume ');
            return /^volume\b/i.test(cleaned) || /^\d+$/.test(cleaned)
                ? cleaned.toLocaleLowerCase('en')
                : formatCitationTitle(cleaned);
        }

        function choosePublicationStatement(candidates) {
            const publisherInfo = findPublisherInfo(candidates);
            const year = findPublicationYear(candidates);
            return buildPublicationBlock(publisherInfo.city, publisherInfo.publisher, year);
        }

        function findPublicationYear(candidates) {
            const yearLine = candidates.find(line => /\b(copyright|first printing|published|publication|édition|impression)\b/i.test(line.text) && extractYear(line.text)) ||
                candidates.find(line => extractYear(line.text));
            return yearLine ? extractYear(yearLine.text) : '';
        }

        function extractYear(text) {
            const match = String(text || '').match(/\b(1[5-9]\d{2}|20\d{2})\b/);
            return match ? match[1] : '';
        }

        function findPublisherInfo(candidates) {
            let best = { publisher: '', city: '', score: 0 };
            for (const line of candidates) {
                const info = parsePublisherLine(line.text);
                if (info.publisher) {
                    if (!info.city) {
                        const nearbyPlace = candidates
                            .filter(candidate => candidate.index > line.index && candidate.index <= line.index + 4)
                            .map(candidate => findPlaceInText(candidate.text))
                            .find(Boolean);
                        info.city = nearbyPlace || '';
                    }
                    const score = scorePublisherInfo(info, line.text);
                    if (score > best.score) {
                        best = { ...info, score };
                    }
                }
            }
            return { publisher: best.publisher, city: best.city };
        }

        function scorePublisherInfo(info, sourceText) {
            let score = 1;
            if (info.city) score += 3;
            if (/\b(published by|éditions?|press|publisher|publishing|inc\.?|co\.?|company|sarl|sons?|wiley|jossey|bass|guilford|cerf)\b/i.test(sourceText)) score += 2;
            if (/\b(copyright|©)\b/i.test(sourceText)) score += 1;
            if (info.publisher.length > 8) score += 1;
            return score;
        }

        function parsePublisherLine(text) {
            let cleaned = cleanFrontMatterLine(text);
            if (!cleaned) return { publisher: '', city: '' };

            const publishedBy = cleaned.match(/^published by\s+(.+)$/i);
            if (publishedBy) cleaned = publishedBy[1];

            cleaned = cleaned
                .replace(/^copyright\s*©?\s*(?:\d{4}\s*)?(?:by\s+)?/i, '')
                .replace(/\b\d{4}\b/g, '')
                .replace(/\ball rights reserved\b/ig, '')
                .replace(/\btous droits réservés\b/ig, '')
                .trim();

            if (!looksLikePublisherLine(cleaned)) return { publisher: '', city: '' };

            const dashParts = cleaned.split(/\s+[–-]\s+/).map(part => cleanFrontMatterLine(part)).filter(Boolean);
            if (dashParts.length > 1) {
                return {
                    publisher: normalizePublisherName(dashParts[0]),
                    city: findPlaceInText(dashParts.slice(1).join(', '))
                };
            }

            const commaParts = cleaned.split(/\s*,\s*/).map(part => cleanFrontMatterLine(part)).filter(Boolean);
            if (/^published by/i.test(text) && commaParts.length > 1) {
                const publisherPartCount = commaParts.length >= 3 && /\b(inc\.?|co\.?|company|sons?)$/i.test(commaParts[1]) ? 2 : 1;
                return {
                    publisher: normalizePublisherName(commaParts.slice(0, publisherPartCount).join(', ')),
                    city: findPlaceInText(commaParts.slice(publisherPartCount).join(', '))
                };
            }

            return {
                publisher: normalizePublisherName(cleaned),
                city: findPlaceInText(cleaned)
            };
        }

        function looksLikePublisherLine(text) {
            const cleaned = cleanFrontMatterLine(text);
            if (!cleaned || looksLikeResponsibilityRoleLine(cleaned)) return false;
            return /\b(press|publisher|publishers|publishing|university|college|éditions?|editiones|books?|inc\.?|co\.?|company|sarl|sons?|wiley|jossey|bass|guilford|excelsis|leaders for leaders|hana medical|cerf)\b/i.test(cleaned);
        }

        function normalizePublisherName(text) {
            const cleaned = cleanFrontMatterLine(text)
                .replace(/\s+site internet\b.*$/i, '')
                .replace(/\s+www\..*$/i, '')
                .replace(/\s+all rights reserved.*$/i, '')
                .replace(/[,;:]+$/g, '');
            return /\b(inc|co|ltd|corp)\.$/i.test(cleaned) ? cleaned : cleaned.replace(/\.$/, '');
        }

        function findPlaceInText(text) {
            const cleaned = cleanFrontMatterLine(text).replace(/\b[A-Z]\d[A-Z]\s*\d[A-Z]\d\b/ig, '');
            const matches = [...cleaned.matchAll(/\b([\p{Lu}][\p{L}' .-]+,\s*(?:[A-Z]{2}|[\p{Lu}][\p{L}' .-]+|France|Korea|New Jersey))\b/gu)];
            for (const match of matches.reverse()) {
                const place = cleanFrontMatterLine(match[1]).replace(/[.,;:]+$/g, '');
                if (!/\b(inc|co|company|sons?|press|publisher|publishing|wiley|jossey|bass)\b/i.test(place)) {
                    return place;
                }
            }
            return '';
        }

        function buildPublicationBlock(city, publisher, year) {
            if (city && publisher && year) return `${city}: ${publisher}, ${year}`;
            if (city && publisher) return `${city}: ${publisher}`;
            if (publisher && year) return `${publisher}, ${year}`;
            return publisher || year || '';
        }

        function scoreTitleCandidate(line, maxFontSize = 0) {
            const text = line.text;
            const wordCount = text.split(/\s+/).length;
            let score = 0;

            if (line.pageNumber <= 3) score += 4;
            if (wordCount >= 2 && wordCount <= 14) score += 4;
            if (line.fontSize >= 12) score += 2;
            if (maxFontSize && line.fontSize && line.fontSize < maxFontSize * 0.72) score -= 5;
            if (maxFontSize && line.fontSize && line.fontSize >= maxFontSize * 0.9) score += 3;
            if (/^[A-Z0-9][A-Za-z0-9'":;,.& -]+$/.test(text)) score += 2;
            if (/[a-z]/.test(text) && /[A-Z]/.test(text)) score += 1;
            if (/^(edited by|translated by|by|chapter|contents|table of contents)\b/i.test(text)) score -= 5;
            if (/^(by|par)$/i.test(text)) score -= 8;
            if (looksLikeSeriesLine(text)) score -= 7;
            if (looksLikeEditionLine(text)) score -= 7;
            if (looksLikeResponsibilityRoleLine(text)) score -= 8;
            if (looksLikeAuthorLine(text) && !(isMostlyAllCaps(text) && maxFontSize && line.fontSize >= maxFontSize * 0.9)) score -= 5;
            if (isMostlyAllCaps(text) && wordCount <= 3) score -= 1;

            return score;
        }

        function looksLikeAuthorLine(text) {
            const cleaned = cleanAuthorLine(text);
            if (!cleaned) return false;
            if (/^(edited|translated|compiled|introduction|foreword|preface)\b/i.test(cleaned)) return false;
            if (looksLikeSeriesLine(cleaned)) return false;
            if (looksLikeEditionLine(cleaned)) return false;

            const words = cleaned.split(/\s+/);
            if (words.length < 2 || words.length > 8) return false;
            if (/^(a|an|and|for|in|of|on|or|the|to|with)\b/i.test(cleaned)) return false;
            if (/[0-9]/.test(cleaned)) return false;
            if (/[;:]/.test(cleaned)) return false;
            if (words.length > 4 && !cleaned.includes(',')) return false;

            return splitAuthorNames(cleaned).some(name => looksLikePersonalName(name));
        }

        function looksLikeSeriesLine(text) {
            const cleaned = cleanFrontMatterLine(text);
            return /^(sources?\s+chr[ée]tiennes?|n[°o]\s*\d+|series|volume|vol\.?)\b/i.test(cleaned) ||
                /\bseries\b/i.test(cleaned);
        }

        function looksLikeEditionLine(text) {
            const cleaned = cleanFrontMatterLine(text);
            return /\b(first|second|third|fourth|fifth|sixth|seventh|eighth|ninth|tenth|\d+(?:st|nd|rd|th)?|premi[èe]re|deuxi[èe]me|troisi[èe]me)\s+(edition|ed\.?|édition|réimpression)\b/i.test(cleaned) ||
                /\b(edition|ed\.?|édition|réimpression)\b/i.test(cleaned) && cleaned.split(/\s+/).length <= 6;
        }

        function looksLikeSubtitleLine(text) {
            const cleaned = cleanFrontMatterLine(text);
            if (!cleaned || isMostlyAllCaps(cleaned)) return false;
            if (looksLikeSeriesLine(cleaned)) return false;
            if (looksLikeResponsibilityRoleLine(cleaned)) return false;

            const words = cleaned.split(/\s+/);
            if (words.length < 2 || words.length > 14) return false;

            const hasTitleConnector = /\b(a|an|and|for|from|how|in|of|on|or|the|to|with|why)\b/i.test(cleaned);
            if (looksLikeAuthorLine(cleaned) && !hasTitleConnector) return false;

            return /^(a|an|and|for|from|how|in|of|on|or|the|to|with|why)\b/i.test(cleaned) ||
                hasTitleConnector ||
                (/[a-z]/.test(cleaned) && /[A-Z]/.test(cleaned));
        }

        function looksLikeDirectResponsibilityLine(text) {
            const cleaned = cleanFrontMatterLine(text);
            return /\b(translated|translation|edited|editor|introduction|introduced|bibliography|bibliographie|notes?|commentary|latin text|texte latin|traduction|traduit|preface|préface|foreword|annotated|annotations?)\b/i.test(cleaned) &&
                /\b(by|par)\b/i.test(cleaned);
        }

        function looksLikeResponsibilityRoleLine(text) {
            const cleaned = cleanFrontMatterLine(text);
            return /\b(translated|translation|edited|editor|introduction|introduced|bibliography|bibliographie|notes?|commentary|latin text|texte latin|traduction|traduit|preface|préface|foreword|annotated|annotations?)\b/i.test(cleaned);
        }

        function normalizeResponsibilityStatement(text) {
            const cleaned = cleanCitationText(stripHtml(text));
            const match = cleaned.match(/^(.*?)\b(by|par)\b\s+(.+)$/i);
            if (!match) {
                return sentenceCaseText(cleaned);
            }

            const role = sentenceCaseText(match[1]);
            const connector = /^par$/i.test(match[2]) ? 'par' : 'by';
            const name = normalizeContributorName(match[3]);
            return cleanCitationText(`${role} ${connector} ${name}`);
        }

        function formatResponsibilityRoles(lines) {
            return sentenceCaseText(cleanCitationText(lines.join(', ')));
        }

        function normalizeContributorName(text) {
            return cleanCitationText(stripHtml(text))
                .replace(/[.,;:]+$/g, '')
                .replace(/\b[\p{L}'’-]+\b/gu, word => (
                    word.length > 1 && word === word.toLocaleUpperCase('fr')
                        ? word.charAt(0).toLocaleUpperCase('fr') + word.slice(1).toLocaleLowerCase('fr')
                        : word
                ));
        }

        function looksLikeContributorName(text) {
            const cleaned = cleanCitationText(text);
            if (!cleaned || cleaned.length > 80) return false;
            if (/[0-9]/.test(cleaned)) return false;
            if (/\b(directeur|director|professor|universit|école|school|press|publisher)\b/i.test(cleaned)) return false;
            return cleaned.split(/\s+/).length >= 2;
        }

        function sentenceCaseText(text) {
            const cleaned = cleanCitationText(text).toLocaleLowerCase('fr');
            return cleaned ? cleaned.charAt(0).toLocaleUpperCase('fr') + cleaned.slice(1) : '';
        }

        function isUsefulFrontMatterLine(text) {
            if (!text || text.length < 3 || text.length > 140) return false;
            if (/^\d+$/.test(text)) return false;
            if (/^(copyright|all rights reserved|printed in|library of congress|isbn|issn|doi|www\.|http|publisher|published by|contents|table of contents)$/i.test(text)) return false;
            if (/(copyright|all rights reserved|library of congress|isbn|issn|cataloging|cataloguing|manufactured in|printed in|permission|rights reserved)/i.test(text)) return false;
            if (/^[.\-_/\\|]+$/.test(text)) return false;
            return true;
        }

        function cleanFrontMatterLine(text) {
            return String(text || '')
                .replace(/\s+/g, ' ')
                .replace(/\s+([,.;:])/g, '$1')
                .replace(/([(["'])\s+/g, '$1')
                .replace(/\s+([)\]"'])/g, '$1')
                .trim();
        }

        function cleanAuthorLine(text) {
            return cleanFrontMatterLine(text)
                .replace(/^by\s+/i, '')
                .replace(/^author\s*:\s*/i, '')
                .replace(/\s+(?:지음|저|著)\s*$/u, '')
                .trim();
        }

        function cleanCitationText(text) {
            return cleanFrontMatterLine(text)
                .replace(/\s*,\s*,/g, ',')
                .replace(/\s+,\s+/g, ', ')
                .trim();
        }

        function plainCitationText(text) {
            return cleanCitationText(stripHtml(text));
        }

        function formatChicagoCitation(author, title, year = '', responsibility = '') {
            const authorPart = formatChicagoAuthors(author);
            const titlePart = title ? formatCitationTitle(title) + '.' : '';
            const responsibilityPart = responsibility ? trimTerminalPunctuation(responsibility) + '.' : '';
            const yearPart = year ? year + '.' : '';

            return [authorPart, titlePart, responsibilityPart, yearPart]
                .filter(Boolean)
                .join(' ')
                .trim()
                .replace(/\s+/g, ' ');
        }

        function normalizeBibliographyCitation(bibliography) {
            if (bibliography === FALLBACK_CITATION) return FALLBACK_CITATION;

            const plainBibliography = plainCitationText(bibliography);
            const parts = parseBibliographyCitation(plainBibliography);
            if (!parts.titleText || !parts.authorText) return plainBibliography;

            const authorPart = formatChicagoAuthors(parts.authorText);
            const titlePart = formatCitationTitle(parts.titleText) + '.';
            const publicationPart = parts.publication ? trimTerminalPunctuation(parts.publication) + '.' : '';

            return cleanCitationText([authorPart, titlePart, publicationPart].filter(Boolean).join(' '));
        }

        function fillDerivedCitationFields(bibliography) {
            const footnoteInput = document.getElementById('footnoteCitation');
            const shortInput = document.getElementById('shortCitation');
            const variants = buildCitationVariantsFromBibliography(bibliography);

            if (!footnoteInput.value.trim() && variants.footnote) {
                footnoteInput.value = variants.footnote;
            }

            if (!shortInput.value.trim() && variants.short) {
                shortInput.value = variants.short;
            }
        }

        function buildCitationVariantsFromBibliography(bibliography) {
            if (bibliography === FALLBACK_CITATION) {
                return { footnote: FALLBACK_CITATION, short: FALLBACK_CITATION };
            }

            const parts = parseBibliographyCitation(bibliography);
            if (!parts.titleText && !parts.authorText) {
                const plainBibliography = plainCitationText(bibliography);
                return { footnote: plainBibliography, short: plainBibliography };
            }

            const footnoteAuthors = bibliographyAuthorsToFootnote(parts.authorText);
            const titleText = formatCitationTitle(parts.titleText || '');
            const footnotePublication = splitFootnotePublicationDetails(parts.publication);
            const titleAndDetails = [
                titleText,
                footnotePublication.details
            ].filter(Boolean).join(', ');
            const titleAndImprint = titleAndDetails + (footnotePublication.imprint ? ' (' + footnotePublication.imprint + ')' : '');
            const footnote = [
                footnoteAuthors,
                titleAndImprint
            ].filter(Boolean).join(', ') + '.';
            const shortResponsibility = formatShortResponsibilityContributor(parts.publication);
            const short = [footnoteAuthors, titleText, shortResponsibility].filter(Boolean).join(', ');

            return {
                footnote: cleanCitationText(footnote),
                short: cleanCitationText(short)
            };
        }

        function parseBibliographyCitation(bibliography) {
            const source = cleanCitationText(bibliography);
            const emMatch = source.match(/<em>([\s\S]+?)<\/em>/i);
            let authorText = '';
            let titleText = '';
            let publication = '';

            if (emMatch) {
                authorText = trimTerminalPunctuation(plainCitationText(source.slice(0, emMatch.index)));
                titleText = plainCitationText(emMatch[1]);
                publication = source.slice(emMatch.index + emMatch[0].length)
                    .replace(/^\s*[.,]\s*/, '');
            } else {
                const pieces = plainCitationText(source).split(/\.\s+/);
                authorText = trimTerminalPunctuation(pieces.shift() || '');
                titleText = trimTerminalPunctuation(pieces.shift() || '');
                publication = pieces.join('. ');
            }

            return {
                authorText,
                titleText,
                publication: trimTerminalPunctuation(plainCitationText(publication))
            };
        }

        function splitFootnotePublicationDetails(publication) {
            const sentences = splitCitationSentences(publication);
            if (sentences.length === 0) {
                return { details: '', imprint: '' };
            }

            const last = sentences[sentences.length - 1];
            if (looksLikePublicationImprint(last)) {
                return {
                    details: sentences.slice(0, -1).join(', '),
                    imprint: last
                };
            }

            return {
                details: sentences.join(', '),
                imprint: ''
            };
        }

        function splitCitationSentences(text) {
            return plainCitationText(text)
                .split(/\.\s+/)
                .map(sentence => trimTerminalPunctuation(sentence))
                .filter(Boolean);
        }

        function looksLikePublicationImprint(text) {
            const cleaned = cleanCitationText(text);
            return /\b(1[5-9]\d{2}|20\d{2})\b/.test(cleaned) &&
                (/:/.test(cleaned) || /\b(press|publisher|publishers|publishing|university|college|éditions?|editiones|cerf|oxford|cambridge|paris|new york|london|chicago|boston|leiden|brill)\b/i.test(cleaned));
        }

        function formatShortResponsibilityContributor(publication) {
            const statement = findResponsibilityStatement(publication);
            if (!statement) return '';

            const contributor = extractResponsibilityContributor(statement);
            if (!contributor) return '';

            if (/\b(translated|translation|traduction|traduit)\b/i.test(statement)) {
                return 'trans. ' + contributor;
            }

            return contributor;
        }

        function findResponsibilityStatement(text) {
            return splitCitationSentences(text)
                .find(sentence => looksLikeResponsibilityRoleLine(sentence) && /\b(by|par)\b/i.test(sentence)) || '';
        }

        function extractResponsibilityContributor(statement) {
            const match = cleanCitationText(statement).match(/\b(?:by|par)\b\s+(.+)$/i);
            if (!match) return '';

            const name = normalizeContributorName(match[1]);
            return looksLikeContributorName(name) ? name : '';
        }

        function bibliographyAuthorsToFootnote(authorText) {
            const authors = splitBibliographyAuthors(authorText);
            const normalNames = authors
                .map((author, index) => {
                    const cleaned = trimAuthorName(author);
                    if (index === 0 || cleaned.includes(',')) {
                        return invertBibliographyName(cleaned);
                    }
                    return cleaned;
                })
                .filter(Boolean);

            if (normalNames.length <= 1) return normalNames[0] || '';
            if (normalNames.length === 2) return normalNames[0] + ' and ' + normalNames[1];
            return normalNames.slice(0, -1).join(', ') + ', and ' + normalNames[normalNames.length - 1];
        }

        function splitBibliographyAuthors(authorText) {
            return splitAuthorNames(authorText);
        }

        function invertBibliographyName(name) {
            const cleaned = trimAuthorName(name);
            if (!cleaned.includes(',')) return cleaned;

            const [last, ...rest] = cleaned.split(',');
            const given = rest.join(',').trim();
            return [given, last.trim()].filter(Boolean).join(' ');
        }

        function splitAuthorNames(authorText) {
            const cleaned = cleanAuthorLine(authorText);
            if (!cleaned) return [];

            const pieces = cleaned
                .replace(/\s+(?:and|&)\s+/gi, ', ')
                .split(/\s*,\s*/)
                .map(piece => trimAuthorName(piece))
                .filter(Boolean);

            if (pieces.length <= 1) return pieces;

            const names = [];
            let index = 0;
            if (pieces.length >= 2 && looksLikeInvertedAuthorPieces(pieces[0], pieces[1])) {
                names.push(`${pieces[0]}, ${pieces[1]}`);
                index = 2;
            }

            for (; index < pieces.length; index++) {
                names.push(pieces[index]);
            }

            return names;
        }

        function looksLikeInvertedAuthorPieces(lastName, givenNames) {
            const last = cleanFrontMatterLine(lastName);
            const given = cleanFrontMatterLine(givenNames);
            if (!last || !given || /[.;:]/.test(last)) return false;
            if (!looksLikeSurnamePiece(last)) return false;
            return given.split(/\s+/).filter(Boolean).length <= 4;
        }

        function looksLikeSurnamePiece(text) {
            const words = cleanFrontMatterLine(text).split(/\s+/).filter(Boolean);
            if (words.length === 0 || words.length > 4) return false;
            if (words.some(word => /\.$/.test(word))) return false;
            if (words.length === 1) return /^\p{Lu}/u.test(words[0]);
            return words.slice(0, -1).every(word => /^\p{Ll}/u.test(word)) && /^\p{Lu}/u.test(words[words.length - 1]);
        }

        function looksLikePersonalName(name) {
            const cleaned = cleanAuthorLine(name);
            if (!cleaned || /[0-9;:]/.test(cleaned)) return false;
            const words = cleaned.replace(/,/g, ' ').split(/\s+/).filter(Boolean);
            if (words.length < 2 || words.length > 5) return false;
            const nameWords = words.filter(word => /^(\p{Lu}[\p{L}'’-]*\.?|[A-Z]\.)$/u.test(word) || /^\p{Ll}{1,3}$/u.test(word));
            const capitalizedWords = words.filter(word => /^(\p{Lu}[\p{L}'’-]*\.?|[A-Z]\.)$/u.test(word));
            return nameWords.length === words.length && capitalizedWords.length >= 2;
        }

        function formatChicagoAuthors(author) {
            const cleaned = cleanAuthorLine(author);
            if (!cleaned) return '';

            const names = splitAuthorNames(cleaned)
                .map(name => normalizeContributorName(name))
                .filter(Boolean);

            if (names.length === 0) return '';

            if (names.length === 1) {
                return punctuateAuthorList(trimAuthorName(invertPersonalName(names[0])));
            }

            const first = trimAuthorName(invertPersonalName(names[0]));
            const rest = names.slice(1).map(trimAuthorName);

            let authorList = '';
            if (rest.length === 1) {
                authorList = first + ', and ' + rest[0];
            } else {
                authorList = first + ', ' + rest.slice(0, -1).join(', ') + ', and ' + rest[rest.length - 1];
            }

            return punctuateAuthorList(authorList);
        }

        function invertPersonalName(name) {
            const cleaned = cleanFrontMatterLine(name);
            if (!cleaned || cleaned.includes(',')) return cleaned;

            const parts = cleaned.split(/\s+/);
            if (parts.length < 2) return cleaned;

            const suffixes = ['Jr.', 'Jr', 'Sr.', 'Sr', 'II', 'III', 'IV', 'V'];
            let suffix = '';
            if (suffixes.includes(parts[parts.length - 1])) {
                suffix = parts.pop();
            }

            const last = parts.pop();
            const given = parts.join(' ');
            return last + ', ' + given + (suffix ? ', ' + suffix : '');
        }

        function trimTerminalPunctuation(text) {
            return cleanFrontMatterLine(text).replace(/[.,;:]+$/g, '');
        }

        function trimAuthorName(text) {
            return cleanFrontMatterLine(text).replace(/[,;:]+$/g, '');
        }

        function punctuateAuthorList(text) {
            const cleaned = cleanCitationText(text);
            return /[.!?]$/.test(cleaned) ? cleaned : cleaned + '.';
        }

        function formatCitationTitle(title) {
            const cleaned = trimTerminalPunctuation(title);
            return cleanCitationText(cleaned.replace(/\b[\p{Lu}][\p{Lu}'’-]{2,}\b/gu, word => {
                if (/^(II|III|IV|IX|VI|VII|VIII|USA|UK|US|PDF|ISBN)$/u.test(word)) return word;
                return word.charAt(0).toLocaleUpperCase('en') + word.slice(1).toLocaleLowerCase('en');
            }));
        }

        function stripHtml(text) {
            const div = document.createElement('div');
            div.innerHTML = String(text || '');
            return div.textContent || '';
        }

        function isMostlyAllCaps(text) {
            const letters = text.replace(/[^A-Za-z]/g, '');
            if (letters.length < 4) return false;
            const uppercase = letters.replace(/[^A-Z]/g, '').length;
            return uppercase / letters.length > 0.85;
        }

        async function getPageNumber(pdf, item) {
            try {
                let dest = item.dest;
                if (typeof dest === 'string') {
                    dest = await pdf.getDestination(dest);
                }
                if (!dest || !Array.isArray(dest)) return null;
                const pageIndex = await pdf.getPageIndex(dest[0]);
                return pageIndex + 1;
            } catch (e) {
                return null;
            }
        }

        function getChapterUrl(token) {
            const workerUrl = WORKER_URL + '?token=' + encodeURIComponent(token);
            return VIEWER_URL + '?file=' + encodeURIComponent(workerUrl);
        }

        /* ── Shared CSS block (only in Part 1) ── */
        function buildStyleBlock(citation) {
            return `<!-- ${escapeHtml(plainCitationText(citation))} - Chapter Links -->
<style>
.dtl-chapters { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
.dtl-chapters-header { background: #f8f9fa; padding: 14px 18px; cursor: pointer; display: flex; align-items: center; gap: 10px; border-radius: 6px; transition: background 0.2s; user-select: none; }
.dtl-chapters-header:hover { background: #f0f0f0; }
.dtl-chapters-arrow { transition: transform 0.2s; font-size: 12px; color: #666; }
.dtl-chapters.open .dtl-chapters-arrow { transform: rotate(90deg); }
.dtl-chapters-citation { font-weight: 600; font-size: 15px; color: #333; }
.dtl-chapters-list { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
.dtl-chapters.open .dtl-chapters-list { max-height: 2000px; }
.dtl-chapters-list ul { list-style: none; padding: 12px 0 12px 28px; margin: 0; }
.dtl-chapters-list li { padding: 8px 0; }
.dtl-chapter-button {
  appearance: none;
  -webkit-appearance: none;
  background: transparent;
  border: 0;
  color: #0061fe !important;
  cursor: pointer;
  display: inline;
  font: inherit;
  font-size: 14px;
  padding: 0;
  text-align: left;
}
.dtl-chapter-button:visited {
  color: #0061fe !important;
}
.dtl-chapter-button:hover,
.dtl-chapter-button:active,
.dtl-chapter-button:focus {
  color: #004bb5 !important;
  text-decoration: none;
}
.dtl-chapter-button:focus { outline: 2px solid #99c2ff; outline-offset: 2px; }
</style>`;
        }

        function buildWrapperOpen(citation, partNum, totalParts) {
            const suffix = totalParts > 1 ? ` (Part ${partNum} of ${totalParts})` : '';
            const citationHtml = escapeHtml(plainCitationText(citation));
            return `
<div class="dtl-chapters open">
  <div class="dtl-chapters-header" onclick="this.parentElement.classList.toggle('open')" tabindex="0" onkeydown="if(event.key==='Enter' || event.key===' ') { event.preventDefault(); this.click(); }">
    <span class="dtl-chapters-arrow">▶</span>
    <span class="dtl-chapters-citation">${citationHtml}${suffix}</span>
  </div>
  <div class="dtl-chapters-list">
    <ul>
`;
        }

        const WRAPPER_CLOSE = `    </ul>
  </div>
</div>
<script>
function dtlOpenChapter(button) {
  var url = button && button.getAttribute("data-dtl-url");
  if (!url) return;
  window.location.replace(url);
}
<\/script>`;

        function buildLiHtml(ch, token) {
            const url = getChapterUrl(token);
            return `      <li><button type="button" class="dtl-chapter-button" data-dtl-url="${escapeAttribute(url)}" onclick="dtlOpenChapter(this)" oncontextmenu="return false;">${escapeHtml(ch.title)}</button></li>\n`;
        }

        /* ── Split chapters into parts of CHAPTERS_PER_PART each ── */
        const CHAPTERS_PER_PART = 30;

        function splitIntoParts(citation, chapters, tokens) {
            const liStrings = chapters.map((ch, i) => buildLiHtml(ch, tokens[i].token));
            const styleBlock = buildStyleBlock(citation);
            const totalParts = Math.ceil(chapters.length / CHAPTERS_PER_PART);

            const parts = [];
            for (let p = 0; p < totalParts; p++) {
                const start = p * CHAPTERS_PER_PART;
                const end = Math.min(start + CHAPTERS_PER_PART, chapters.length);

                let html = styleBlock + '\n';
                html += buildWrapperOpen(citation, p + 1, totalParts);
                for (let i = start; i < end; i++) {
                    html += liStrings[i];
                }
                html += WRAPPER_CLOSE;

                parts.push({
                    html,
                    chapterCount: end - start,
                    partNumber: p + 1
                });
            }

            return parts;
        }

        function generateOutput(citation, chapters, tokens, totalPages) {
            const parts = splitIntoParts(citation, chapters, tokens);
            generatedParts = parts;

            // Result info
            document.getElementById('resultInfo').innerHTML =
                '<strong>' + chapters.length + ' chapters</strong> extracted from a ' + totalPages + '-page PDF';

            // Split notice
            const notice = document.getElementById('splitNotice');
            if (parts.length > 1) {
                notice.style.display = 'flex';
                document.getElementById('splitNoticeText').innerHTML =
                    'Output was split into <strong>' + parts.length + ' parts</strong> (' +
                    CHAPTERS_PER_PART + ' chapters each). ' +
                    'Paste each part into a <strong>separate HTML box</strong> on the same page, in order.';
            } else {
                notice.style.display = 'none';
            }

            // Build part blocks
            const container = document.getElementById('partsContainer');
            container.innerHTML = '';

            parts.forEach((part, i) => {
                const block = document.createElement('div');
                block.className = 'part-block';
                block.innerHTML = `
                    <div class="part-block-header">
                        <span class="part-label">${parts.length === 1 ? 'HTML Output' : 'Part ' + part.partNumber + ' of ' + parts.length + ' — ' + part.chapterCount + ' chapters'}</span>
                    </div>
                    <div class="code-output">
                        <pre></pre>
                    </div>
                    <div class="part-actions">
                        <button class="btn-copy-part" onclick="copyPart(${i})">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                            Copy${parts.length > 1 ? ' Part ' + part.partNumber : ''}
                        </button>
                        <span class="copy-confirm" id="copyConfirm${i}">✓ Copied!</span>
                    </div>
                `;
                // Set code text safely (textContent, not innerHTML)
                block.querySelector('pre').textContent = part.html;
                container.appendChild(block);
            });

            // Preview: combine all parts
            const fullHtml = parts.map(p => p.html).join('\n');
            document.getElementById('previewBox').innerHTML = fullHtml;

            showStatus('', 'success');
            document.getElementById('resultsBody').style.display = 'block';
        }

        function copyPart(index) {
            const code = generatedParts[index].html;
            navigator.clipboard.writeText(code).then(() => {
                showCopyConfirm(index);
            }).catch(() => {
                // Fallback
                const textarea = document.createElement('textarea');
                textarea.value = code;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showCopyConfirm(index);
            });
        }

        function copyMetadataField(fieldId, btnElement) {
            const field = document.getElementById(fieldId);
            navigator.clipboard.writeText(field.value).then(() => {
                showInlineCopyConfirm(btnElement);
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = field.value;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showInlineCopyConfirm(btnElement);
            });
        }

        function showInlineCopyConfirm(btnElement) {
            const originalText = btnElement.textContent;
            btnElement.textContent = 'Copied!';
            btnElement.style.background = '#d1fae5';
            btnElement.style.borderColor = '#10b981';
            btnElement.style.color = '#065f46';

            setTimeout(() => {
                btnElement.textContent = originalText;
                btnElement.style.background = 'white';
                btnElement.style.borderColor = '';
                btnElement.style.color = '';
            }, 2000);
        }

        function showCopyConfirm(index) {
            const el = document.getElementById('copyConfirm' + index);
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 2500);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function escapeAttribute(text) {
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/"/g, '&quot;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        document.getElementById('staffPassword').addEventListener('keypress', e => {
            if (e.key === 'Enter') document.getElementById('citation').focus();
        });

        document.getElementById('citation').addEventListener('change', function() {
            if (this.value.trim()) {
                const citation = normalizeBibliographyCitation(this.value.trim());
                this.value = citation;
                fillDerivedCitationFields(citation);
            }
        });

        document.getElementById('citation').addEventListener('keypress', e => {
            if (e.key === 'Enter') document.getElementById('dropboxUrl').focus();
        });

        document.getElementById('dropboxUrl').addEventListener('keypress', e => {
            if (e.key === 'Enter') analyzePDF();
        });
    </script>
</body>
</html>
