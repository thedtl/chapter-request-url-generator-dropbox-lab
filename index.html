<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropbox Chapter Link Generator | DTL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0061fe;
            --primary-hover: #004bb5;
            --success: #10b981;
            --success-bg: #d1fae5;
            --warning: #f59e0b;
            --warning-bg: #fef3c7;
            --error: #ef4444;
            --error-bg: #fee2e2;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --radius: 10px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            min-height: 100vh;
            color: var(--gray-800);
            line-height: 1.5;
        }

        .header {
            background: white;
            border-bottom: 1px solid var(--gray-200);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 20px;
            color: var(--gray-900);
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .staff-badge {
            background: var(--warning-bg);
            color: #92400e;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        .card {
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 24px;
            overflow: hidden;
        }

        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--gray-100);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card-header h2 { font-size: 16px; font-weight: 600; }

        .results-header {
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        .ready-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .ready-copy-actions {
            display: none;
            align-items: center;
            justify-content: flex-end;
            flex-wrap: wrap;
            gap: 8px;
            margin-left: auto;
        }

        .ready-copy-actions.show {
            display: flex;
        }

        .btn-copy-ready {
            flex: 0 0 auto;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-family: inherit;
            background: var(--success);
            color: white;
        }

        .btn-copy-ready:hover { background: #059669; }

        .card-header .step {
            background: var(--primary);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
        }

        .card-body { padding: 24px; }

        .form-group { margin-bottom: 20px; }
        .form-group:last-child { margin-bottom: 0; }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--gray-700);
            margin-bottom: 8px;
        }

        .label-hint {
            font-weight: 400;
            color: var(--gray-500);
            font-size: 13px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            font-size: 15px;
            border: 2px solid var(--gray-200);
            border-radius: 8px;
            outline: none;
            transition: all 0.2s;
            font-family: inherit;
            background: white;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 97, 254, 0.1);
        }

        input::placeholder {
            color: var(--gray-400);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 28px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-family: inherit;
            width: 100%;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover { background: var(--primary-hover); }
        .btn-primary:disabled { background: var(--gray-300); cursor: not-allowed; }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover { background: #059669; }

        .field-note {
            display: none;
            margin-top: 8px;
            font-size: 13px;
            color: var(--gray-600);
        }

        .field-note.error { color: var(--error); }
        .field-note.success { color: var(--success); }

        .metadata-label-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 8px;
        }

        .metadata-label-row label {
            margin-bottom: 0;
        }

        .btn-copy-field {
            flex: 0 0 auto;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--gray-300);
            font-family: inherit;
            background: white;
            color: var(--gray-700);
        }

        .btn-copy-field:hover {
            background: var(--gray-50);
            border-color: var(--gray-400);
        }

        .status-bar {
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
        }

        .status-bar.loading { background: var(--gray-50); color: var(--gray-600); }
        .status-bar.success { background: var(--success-bg); color: #065f46; }
        .status-bar.error { background: var(--error-bg); color: #991b1b; }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid var(--gray-200);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .result-info {
            background: var(--gray-50);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
            font-size: 14px;
            color: var(--gray-600);
        }

        .result-info strong {
            color: var(--gray-800);
        }

        .split-notice {
            background: var(--warning-bg);
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #92400e;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            line-height: 1.5;
        }

        .split-notice-icon { flex-shrink: 0; font-size: 16px; }

        .part-block {
            margin-bottom: 24px;
            border: 2px solid var(--gray-200);
            border-radius: 10px;
            overflow: hidden;
        }

        .part-block-header {
            background: var(--gray-50);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--gray-200);
        }

        .part-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--gray-700);
        }

        .code-output {
            background: var(--gray-900);
            padding: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        .code-output pre {
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 12px;
            color: #e5e7eb;
            white-space: pre-wrap;
            word-break: break-all;
            margin: 0;
        }

        .part-actions {
            padding: 12px 16px;
            border-top: 1px solid var(--gray-200);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-copy-part {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-family: inherit;
            background: var(--success);
            color: white;
        }

        .btn-copy-part:hover { background: #059669; }

        .copy-confirm {
            font-size: 13px;
            color: var(--success);
            font-weight: 600;
            display: none;
            align-items: center;
            gap: 4px;
        }

        .copy-confirm.show { display: inline-flex; }

        .copy-all-btn {
            margin-bottom: 20px;
        }

        @media (max-width: 640px) {
            .results-header {
                align-items: flex-start;
            }

            .ready-copy-actions {
                width: 100%;
                justify-content: flex-start;
                margin-left: 40px;
            }
        }

        .preview-section {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--gray-200);
        }

        .preview-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--gray-500);
            margin-bottom: 12px;
        }

        .preview-box {
            border: 2px solid var(--gray-200);
            border-radius: 8px;
            padding: 16px;
            background: white;
        }

        .password-saved {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--success);
            margin-left: 8px;
        }

        @media (max-width: 640px) {
            .header-content { flex-direction: column; gap: 12px; }
        }

        .dtl-chapters { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .dtl-chapters-header {
            background: #f8f9fa;
            padding: 14px 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            border-radius: 6px;
            transition: background 0.2s;
            user-select: none;
        }
        .dtl-chapters-header:hover { background: #f0f0f0; }
        .dtl-chapters-arrow {
            transition: transform 0.2s;
            font-size: 12px;
            color: #666;
        }
        .dtl-chapters.open .dtl-chapters-arrow { transform: rotate(90deg); }
        .dtl-chapters-citation {
            font-weight: 600;
            font-size: 15px;
            color: #333;
        }
        .dtl-chapters-list {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }
        .dtl-chapters.open .dtl-chapters-list { max-height: 2000px; }
        .dtl-chapters-list ul {
            list-style: none;
            padding: 12px 0 12px 28px;
            margin: 0;
        }
        .dtl-chapters-list li { padding: 8px 0; }
        .dtl-chapters-list a:link,
        .dtl-chapters-list a:visited {
            color: #0061fe !important;
            text-decoration: none;
            font-size: 14px;
        }
        .dtl-chapters-list a:hover,
        .dtl-chapters-list a:active {
            color: #004bb5 !important;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">ð</div>
                <span>Dropbox Chapter Link Generator</span>
            </div>
            <div class="staff-badge">ð Staff Tool</div>
        </div>
    </header>

    <main class="container">
        <div class="card">
            <div class="card-header">
                <span class="step">1</span>
                <h2>Staff Authentication</h2>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label for="staffPassword">
                        Staff Password
                        <span id="passwordSaved" class="password-saved" style="display: none;">â Saved</span>
                    </label>
                    <input type="password" id="staffPassword" placeholder="Enter staff password">
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <span class="step">2</span>
                <h2>Book Information</h2>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label for="dropboxUrl">Dropbox Link</label>
                    <input type="text" id="dropboxUrl" placeholder="https://www.dropbox.com/...">
                </div>
                <div class="form-group">
                    <div class="metadata-label-row">
                        <label for="citation">Citation <span class="label-hint">(Chicago-style bibliography entry)</span></label>
                        <button type="button" class="btn-copy-field" onclick="copyMetadataField('citation', this)">Copy</button>
                    </div>
                    <input type="text" id="citation" placeholder="Leave blank to fill from the PDF, or type your own citation">
                    <div id="citationSuggestionNote" class="field-note"></div>
                </div>
                <div class="form-group">
                    <div class="metadata-label-row">
                        <label for="footnoteCitation">Chicago Footnote Style</label>
                        <button type="button" class="btn-copy-field" onclick="copyMetadataField('footnoteCitation', this)">Copy</button>
                    </div>
                    <input type="text" id="footnoteCitation" placeholder="Auto-filled from the bibliography entry">
                </div>
                <div class="form-group">
                    <div class="metadata-label-row">
                        <label for="shortCitation">Short Display Line</label>
                        <button type="button" class="btn-copy-field" onclick="copyMetadataField('shortCitation', this)">Copy</button>
                    </div>
                    <input type="text" id="shortCitation" placeholder="Auto-filled from the bibliography entry">
                    <div class="field-note" style="display: block;">Only the bibliography entry is used in the generated HTML. The other lines are for copy/paste.</div>
                </div>

            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <button class="btn btn-primary" onclick="analyzePDF()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
                    </svg>
                    Generate Chapter Links
                </button>
            </div>
        </div>

        <div class="card" id="resultsCard" style="display: none;">
            <div class="card-header results-header">
                <div class="ready-title">
                    <span class="step">â</span>
                    <h2>Ready to Copy</h2>
                </div>
                <div class="ready-copy-actions" id="readyCopyActions" aria-label="Copy generated HTML"></div>
            </div>

            <div class="status-bar" id="statusBar" style="display: none;"></div>

            <div class="card-body" id="resultsBody">
                <div class="result-info" id="resultInfo"></div>
                <div id="splitNotice" class="split-notice" style="display: none;">
                    <span class="split-notice-icon">â ïļ</span>
                    <span id="splitNoticeText"></span>
                </div>
                <div id="partsContainer"></div>

                <div class="preview-section">
                    <div class="preview-label">Preview (how it will look when all parts are pasted)</div>
                    <div class="preview-box" id="previewBox"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <script>
        const VIEWER_URL = "https://thedtl.github.io/reader/web/viewer.html";
        const WORKER_URL = "https://dtl-chapter-reader-dropbox-lab.reference-dfe.workers.dev";

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let generatedParts = [];
        let autoFilledCitation = { value: '', sourceKey: '' };
        const FALLBACK_CITATION = 'Citation needed';
        const FRONT_MATTER_PAGE_LIMIT = 12;
        const BACK_MATTER_PAGE_LIMIT = 6;
        const CITATION_IMAGE_RENDER_SCALE = 1.8;
        const CITATION_IMAGE_JPEG_QUALITY = 0.9;
        const NAME_CREDENTIAL_PATTERN = String.raw`(?:o\.?\s*f\.?\s*m\.?(?:\s*cap\.?)?|ofm\s*cap\.?|ofmcap|ofin\s*cap\.?|ofincap|s\.?\s*j\.?|o\.?\s*p\.?|o\.?\s*s\.?\s*b\.?|o\.?\s*c\.?\s*s\.?\s*o\.?|c\.?\s*s\.?\s*r\.?|s\.?\s*d\.?\s*b\.?|c\.?\s*s\.?\s*c\.?|ph\.?\s*d\.?|d\.?\s*phil\.?|m\.?\s*div\.?|th\.?\s*d\.?|d\.?\s*min\.?|ed\.?\s*d\.?|psy\.?\s*d\.?|s\.?\s*t\.?\s*d\.?|s\.?\s*t\.?\s*l\.?|j\.?\s*c\.?\s*d\.?|j\.?\s*d\.?|m\.?\s*d\.?|d\.?\s*d\.?|m\.?\s*s\.?\s*w\.?|l\.?\s*c\.?\s*s\.?\s*w\.?|l\.?\s*m\.?\s*s\.?\s*w\.?|m\.?\s*b\.?\s*a\.?|r\.?\s*n\.?|m\.\s*a\.|b\.\s*a\.|m\.\s*s\.|b\.\s*s\.)`;
        const COMMA_NAME_CREDENTIAL_PATTERN = String.raw`(?:${NAME_CREDENTIAL_PATTERN}|m\s*a|b\s*a|m\s*s|b\s*s)`;

        document.addEventListener('DOMContentLoaded', () => {
            const savedPassword = sessionStorage.getItem('dtl_staff_password');
            if (savedPassword) {
                document.getElementById('staffPassword').value = savedPassword;
                document.getElementById('passwordSaved').style.display = 'inline-flex';
            }
        });

        document.getElementById('staffPassword').addEventListener('change', function() {
            if (this.value) {
                sessionStorage.setItem('dtl_staff_password', this.value);
                document.getElementById('passwordSaved').style.display = 'inline-flex';
            } else {
                sessionStorage.removeItem('dtl_staff_password');
                document.getElementById('passwordSaved').style.display = 'none';
            }
        });

        function showCitationNote(message, type = '') {
            const note = document.getElementById('citationSuggestionNote');
            note.textContent = message;
            note.className = 'field-note' + (type ? ' ' + type : '');
            note.style.display = message ? 'block' : 'none';
        }

        function showStatus(message, type = 'loading') {
            const card = document.getElementById('resultsCard');
            const bar = document.getElementById('statusBar');
            const body = document.getElementById('resultsBody');

            card.style.display = 'block';
            bar.style.display = 'flex';
            bar.className = 'status-bar ' + type;
            body.style.display = type === 'loading' ? 'none' : 'block';

            const readyCopyActions = document.getElementById('readyCopyActions');
            if (type !== 'success') {
                readyCopyActions.innerHTML = '';
                readyCopyActions.classList.remove('show');
            }

            if (type === 'loading') {
                bar.innerHTML = '<div class="spinner"></div><span>' + message + '</span>';
            } else if (type === 'error') {
                bar.innerHTML = '<span>â</span><span>' + message + '</span>';
            } else if (type === 'success') {
                bar.style.display = 'none';
            }
        }

        async function requestHeadingSuggestion(staffPassword, lines, images, sourceHints = {}) {
            try {
                const response = await fetch(WORKER_URL + '/suggest-heading', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        password: staffPassword,
                        lines,
                        images,
                        sourceAuthorHint: sourceHints.author || '',
                        sourceTitleHint: sourceHints.title || ''
                    })
                });

                const data = await response.json();
                if (!response.ok || data.error) {
                    throw new Error(data.error || 'Worker heading suggestion failed');
                }

                return {
                    heading: String(data.heading || '').trim(),
                    source: data.source || 'worker',
                    note: data.note || ''
                };
            } catch (error) {
                console.warn('Worker heading suggestion unavailable; using browser fallback.', error);
                return { heading: '', source: 'fallback', note: '' };
            }
        }

        async function fillCitationFromPdfIfNeeded(pdf, staffPassword, sourceKey = '') {
            const citationInput = document.getElementById('citation');
            const existingCitation = citationInput.value.trim();
            const isExistingAutoFill = existingCitation &&
                autoFilledCitation.value === existingCitation &&
                autoFilledCitation.sourceKey === sourceKey;

            if (existingCitation && !isExistingAutoFill) {
                const citation = normalizeBibliographyCitation(existingCitation);
                citationInput.value = citation;
                fillDerivedCitationFields(citation);
                showCitationNote('');
                return citation;
            }

            showStatus('Reading PDF front matter and imprint pages for citation...');
            showCitationNote('Reading the first and final pages and filling the citation...');

            try {
                const citationPages = getCitationPageNumbers(pdf, FRONT_MATTER_PAGE_LIMIT, BACK_MATTER_PAGE_LIMIT);
                const lines = await extractFrontMatterLines(pdf, citationPages);
                const images = await renderFrontMatterImages(pdf, citationPages);
                const workerSuggestion = await requestHeadingSuggestion(staffPassword, lines, images);
                const suggestion = workerSuggestion.heading || buildCitationSuggestion(lines);

                if (suggestion) {
                    const citation = normalizeAutoFilledCitation(suggestion, workerSuggestion.source);
                    citationInput.value = citation;
                    markCitationAutoFilled(citation, sourceKey);
                    fillDerivedCitationFields(citation);
                    showCitationNote('Citation filled from PDF. Please review it in the generated preview.', 'success');
                    return citation;
                }

                console.warn('No clear citation found:', workerSuggestion.note || 'No suggestion returned');
            } catch (error) {
                console.warn('Citation extraction error:', error);
            }

            showCitationNote('Could not auto-fill a clear citation. Code generated anyway; edit the metadata lines and generate again if needed.', 'error');
            const fallbackCitation = normalizeBibliographyCitation(citationInput.value.trim()) || FALLBACK_CITATION;
            citationInput.value = fallbackCitation;
            return fallbackCitation;
        }

        function markCitationAutoFilled(citation, sourceKey) {
            autoFilledCitation = { value: citation, sourceKey };
        }

        function clearCitationAutoFillState() {
            autoFilledCitation = { value: '', sourceKey: '' };
        }

        async function analyzePDF() {
            const staffPassword = document.getElementById('staffPassword').value;
            let citation = document.getElementById('citation').value.trim();
            const dropboxUrl = document.getElementById('dropboxUrl').value.trim();

            if (!staffPassword) {
                showStatus('Please enter the staff password', 'error');
                document.getElementById('staffPassword').focus();
                return;
            }

            if (!dropboxUrl) {
                showStatus('Please enter a Dropbox URL', 'error');
                document.getElementById('dropboxUrl').focus();
                return;
            }

            if (!dropboxUrl.includes('dropbox.com')) {
                showStatus("This doesn't look like a Dropbox URL", 'error');
                return;
            }

            showStatus('Loading PDF and extracting chapters...');

            try {
                const analyzeUrl = WORKER_URL + '/analyze?' + new URLSearchParams({
                    password: staffPassword,
                    dropbox: dropboxUrl
                });

                const pdf = await pdfjsLib.getDocument({ url: analyzeUrl }).promise;
                const totalPages = pdf.numPages;
                citation = await fillCitationFromPdfIfNeeded(pdf, staffPassword, dropboxUrl);

                showStatus('Extracting bookmarks...');

                const outline = await pdf.getOutline();

                if (!outline || outline.length === 0) {
                    showStatus('No bookmarks found in this PDF. Please add bookmarks to the PDF first, then try again.', 'error');
                    return;
                }

                const chapters = await extractChapters(pdf, outline, totalPages);

                if (chapters.length === 0) {
                    showStatus('Could not extract chapter information from bookmarks.', 'error');
                    return;
                }

                showStatus('Generating secure chapter links...');

                const signResponse = await fetch(WORKER_URL + '/batch-sign', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        password: staffPassword,
                        dropbox: dropboxUrl,
                        chapters: chapters.map(ch => ({
                            title: ch.title,
                            start: ch.start,
                            end: ch.end
                        })),
                        download: false
                    })
                });

                const signData = await signResponse.json();

                if (signData.error) {
                    throw new Error(signData.error);
                }

                generateOutput(citation, chapters, signData.tokens, totalPages);

            } catch (error) {
                console.error('Error:', error);
                if (error.message.includes('fetch')) {
                    showStatus('Network error. Please check your connection and try again.', 'error');
                } else {
                    showStatus('Error: ' + error.message, 'error');
                }
            }
        }

        async function extractChapters(pdf, outline, totalPages) {
            const chapters = [];

            for (let i = 0; i < outline.length; i++) {
                const item = outline[i];
                const nextItem = outline[i + 1];

                try {
                    let startPage = await getPageNumber(pdf, item);
                    if (startPage === null) continue;

                    let endPage;
                    if (nextItem) {
                        const nextStart = await getPageNumber(pdf, nextItem);
                        endPage = nextStart !== null ? nextStart - 1 : totalPages;
                    } else {
                        endPage = totalPages;
                    }

                    if (endPage < startPage) endPage = startPage;

                    chapters.push({
                        title: item.title.trim(),
                        start: startPage,
                        end: endPage
                    });
                } catch (e) {
                    console.warn('Could not process bookmark:', item.title, e);
                }
            }

            return chapters;
        }

        function getCitationPageNumbers(pdf, frontPages, backPages) {
            const pages = new Set();
            const frontLimit = Math.min(pdf.numPages, frontPages);
            for (let pageNumber = 1; pageNumber <= frontLimit; pageNumber++) {
                pages.add(pageNumber);
            }

            const backStart = Math.max(frontLimit + 1, pdf.numPages - backPages + 1);
            for (let pageNumber = backStart; pageNumber <= pdf.numPages; pageNumber++) {
                pages.add(pageNumber);
            }

            return [...pages].sort((a, b) => a - b);
        }

        async function extractFrontMatterLines(pdf, pageNumbers) {
            const lines = [];

            for (const pageNumber of pageNumbers) {
                const page = await pdf.getPage(pageNumber);
                const content = await page.getTextContent();
                lines.push(...groupTextItemsIntoLines(content.items, pageNumber));
            }

            return lines;
        }

        async function renderFrontMatterImages(pdf, pageNumbers) {
            const images = [];

            for (const pageNumber of pageNumbers) {
                const page = await pdf.getPage(pageNumber);
                const viewport = page.getViewport({ scale: CITATION_IMAGE_RENDER_SCALE });
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d', { alpha: false });
                canvas.width = Math.floor(viewport.width);
                canvas.height = Math.floor(viewport.height);

                await page.render({ canvasContext: context, viewport }).promise;

                const dataUrl = canvas.toDataURL('image/jpeg', CITATION_IMAGE_JPEG_QUALITY);
                images.push({
                    pageNumber,
                    mimeType: 'image/jpeg',
                    data: dataUrl.replace(/^data:image\/jpeg;base64,/, '')
                });
            }

            return images;
        }

        function groupTextItemsIntoLines(items, pageNumber) {
            const rows = new Map();

            items.forEach(item => {
                const raw = String(item.str || '').trim();
                if (!raw) return;

                const transform = item.transform || [];
                const x = Number(transform[4] || 0);
                const y = Number(transform[5] || 0);
                const fontSize = Math.abs(Number(transform[0] || item.height || 0));
                const key = Math.round(y / 3) * 3;

                if (!rows.has(key)) {
                    rows.set(key, []);
                }

                rows.get(key).push({ text: raw, x, fontSize });
            });

            return [...rows.entries()]
                .sort((a, b) => b[0] - a[0])
                .map(([, parts]) => {
                    const sorted = parts.sort((a, b) => a.x - b.x);
                    const text = cleanFrontMatterLine(sorted.map(part => part.text).join(' '));
                    const maxFontSize = Math.max(...sorted.map(part => part.fontSize || 0));
                    return { text, pageNumber, fontSize: maxFontSize };
                })
                .filter(line => line.text);
        }

        function buildCitationSuggestion(lines) {
            const sourceLines = lines
                .map((line, index) => ({ ...line, index }))
                .filter(line => cleanFrontMatterLine(line.text));

            if (sourceLines.length === 0) {
                return '';
            }

            const fields = extractLineCitationFields(sourceLines);
            if (fields.title || fields.contributor) {
                const details = [fields.responsibility, fields.series, fields.edition, fields.publication].filter(Boolean).join('. ');
                return formatChicagoCitation(fields.contributor, fields.title, '', details);
            }

            return plainCitationText(fields.fallback || sourceLines[0].text);
        }

        function extractLineCitationFields(sourceLines) {
            const titlePageFields = extractTitlePageCitationFields(sourceLines);
            const catalogFields = extractCatalogCitationFields(sourceLines);

            if (shouldPreferCatalogCitationFields(titlePageFields, catalogFields)) {
                return preferCitationFields(catalogFields, titlePageFields);
            }

            return titlePageFields;
        }

        function extractTitlePageCitationFields(sourceLines) {
            const candidates = sourceLines
                .filter(line => isUsefulFrontMatterLine(line.text));
            const title = chooseTitleLine(candidates);
            const author = title ? chooseAuthorLine(candidates, title.index) : '';
            const responsibility = title ? chooseResponsibilityStatement(candidates, title.index) : '';
            const series = title ? chooseSeriesStatement(candidates, title.index) : '';
            const edition = title ? chooseEditionStatement(candidates, title.index) : '';
            const publication = choosePublicationStatement(sourceLines);
            const titleText = title ? collectTitleText(candidates, title) : '';

            return {
                contributor: author,
                title: titleText,
                responsibility,
                series,
                edition,
                publication,
                fallback: title?.text || sourceLines[0]?.text || ''
            };
        }

        function extractCatalogCitationFields(sourceLines) {
            const cleanLines = sourceLines
                .map(line => cleanFrontMatterLine(line.text))
                .filter(Boolean);
            const titleIndex = cleanLines.findIndex(line => /^title\s*:/i.test(line));
            if (titleIndex < 0) {
                return emptyCitationFields();
            }

            const titleParts = [cleanLines[titleIndex].replace(/^title\s*:\s*/i, '')];
            for (const line of cleanLines.slice(titleIndex + 1, titleIndex + 5)) {
                if (isCatalogControlLine(line)) break;
                titleParts.push(line);
            }

            const titleStatement = cleanCitationText(titleParts.join(' '));
            const [rawTitle, rawContributor = ''] = titleStatement.split(/\s+\/\s+/, 2);
            if (!rawTitle) {
                return emptyCitationFields();
            }

            const description = cleanLines.find(line => /^description\s*:/i.test(line)) || '';
            const edition = extractEditionFromCatalogDescription(description);

            return {
                contributor: cleanAuthorLine(rawContributor.replace(/\s*\|.*$/g, '').replace(/[.;:]+$/g, '')),
                title: formatCatalogTitle(rawTitle.replace(/\s+:\s+/g, ': ')),
                responsibility: '',
                series: '',
                edition,
                publication: choosePublicationStatement(sourceLines),
                fallback: titleStatement
            };
        }

        function emptyCitationFields() {
            return {
                contributor: '',
                title: '',
                responsibility: '',
                series: '',
                edition: '',
                publication: '',
                fallback: ''
            };
        }

        function shouldPreferCatalogCitationFields(titlePageFields, catalogFields) {
            if (!catalogFields.title) return false;
            if (!titlePageFields.title) return true;
            if (looksLikeCatalogControlLine(titlePageFields.title) || looksLikePublisherLine(titlePageFields.title)) return true;
            return titlePageFields.contributor && titleContainsText(catalogFields.title, titlePageFields.contributor);
        }

        function preferCitationFields(preferred, fallback) {
            return {
                contributor: preferred.contributor || fallback.contributor,
                title: preferred.title || fallback.title,
                responsibility: preferred.responsibility || fallback.responsibility,
                series: preferred.series || fallback.series,
                edition: preferred.edition || fallback.edition,
                publication: preferred.publication || fallback.publication,
                fallback: preferred.fallback || fallback.fallback
            };
        }

        function extractEditionFromCatalogDescription(description) {
            const match = cleanFrontMatterLine(description)
                .replace(/^description\s*:\s*/i, '')
                .match(/\b(first|second|third|fourth|fifth|sixth|seventh|eighth|ninth|tenth|\d+(?:st|nd|rd|th)?)\s+edition\b/i);
            return match ? sentenceCaseText(match[0]) : '';
        }

        function formatCatalogTitle(text) {
            const smallWords = new Set(['a', 'an', 'and', 'as', 'at', 'but', 'by', 'for', 'from', 'in', 'nor', 'of', 'on', 'or', 'the', 'to', 'with']);
            let capitalizeNext = true;
            return cleanCitationText(text)
                .toLocaleLowerCase('en')
                .replace(/\b[\p{L}'â-]+\b/gu, (word, offset, source) => {
                    const lower = word.toLocaleLowerCase('en');
                    const replacement = capitalizeNext || !smallWords.has(lower)
                        ? lower.charAt(0).toLocaleUpperCase('en') + lower.slice(1)
                        : lower;
                    const after = source.slice(offset + word.length).trimStart();
                    capitalizeNext = /^[:.!?]/.test(after);
                    return replacement;
                });
        }

        function isCatalogControlLine(text) {
            return /^(names|title|description|identifiers|subjects|classification|lc\s+record|cover\s+(design|art))\s*:/i.test(cleanFrontMatterLine(text));
        }

        function looksLikeCatalogControlLine(text) {
            const cleaned = cleanFrontMatterLine(text);
            return /^published\b/i.test(cleaned) || isCatalogControlLine(cleaned);
        }

        function titleContainsText(title, text) {
            const titleKey = normalizeTitleComparison(title);
            const textKey = normalizeTitleComparison(text);
            return Boolean(titleKey && textKey && titleKey.includes(textKey));
        }

        function normalizeTitleComparison(text) {
            return cleanCitationText(text)
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .replace(/[^\p{L}\p{N}]+/gu, ' ')
                .toLocaleLowerCase('en')
                .trim();
        }

        function chooseTitleLine(candidates) {
            const maxFontSize = Math.max(...candidates.map(line => line.fontSize || 0));
            const scored = candidates.map(line => ({
                ...line,
                score: scoreTitleCandidate(line, maxFontSize)
            }));

            scored.sort((a, b) => b.score - a.score);
            return scored[0] && scored[0].score > 0 ? scored[0] : null;
        }

        function collectTitleText(candidates, title) {
            const titleLines = [title];
            collectAdjacentTitleLines(candidates, title, -1)
                .reverse()
                .forEach(line => titleLines.unshift(line));
            collectAdjacentTitleLines(candidates, title, 1)
                .forEach(line => titleLines.push(line));

            const subtitleIndex = titleLines.findIndex((line, index) => index > 0 && looksLikeSubtitleLine(line.text));
            if (subtitleIndex > 0) {
                const mainTitle = formatCitationTitle(titleLines.slice(0, subtitleIndex).map(line => line.text).join(' '));
                const subtitle = formatCitationTitle(titleLines.slice(subtitleIndex).map(line => line.text).join(' '));
                return cleanCitationText(`${mainTitle}: ${subtitle}`);
            }

            return formatCitationTitle(titleLines.map(line => line.text).join(' '));
        }

        function collectAdjacentTitleLines(candidates, title, direction) {
            const lines = [];
            let nextIndex = title.index + direction;

            while (lines.length < 3) {
                const next = candidates.find(line => line.index === nextIndex);
                if (!next || !isTitleContinuationLine(next, title, direction)) {
                    break;
                }

                lines.push(next);
                nextIndex += direction;
            }

            return lines;
        }

        function isTitleContinuationLine(line, title, direction = 1) {
            const text = cleanFrontMatterLine(line.text);
            const wordCount = text.split(/\s+/).length;
            if (!text || wordCount > 9) return false;
            if (line.pageNumber !== title.pageNumber) return false;
            if (title.fontSize && line.fontSize && line.fontSize < title.fontSize * 0.72) {
                if (!(direction > 0 && line.fontSize >= title.fontSize * 0.45 && looksLikeSubtitleLine(text))) {
                    return false;
                }
            }
            if (/^(by|par)$/i.test(text)) return false;
            if (looksLikeSeriesLine(text)) return false;
            if (looksLikeEditionLine(text)) return false;
            if (looksLikeResponsibilityRoleLine(text)) return false;
            if (looksLikeSubtitleLine(text)) return true;
            if (looksLikeAuthorLine(text) && !(isMostlyAllCaps(text) && title.fontSize && line.fontSize >= title.fontSize * 0.72)) return false;
            return scoreTitleCandidate(line) > 0;
        }

        function chooseAuthorLine(candidates, titleIndex) {
            const title = candidates.find(line => line.index === titleIndex);
            const titleLineIndexes = getTitleLineIndexes(candidates, title);
            const authorBeforeTitle = candidates
                .filter(line => (
                    line.index < titleIndex &&
                    line.index >= titleIndex - 6 &&
                    !titleLineIndexes.has(line.index) &&
                    looksLikeAuthorLine(line.text) &&
                    !looksLikeSeriesLine(line.text)
                ))
                .sort((a, b) => b.index - a.index);

            if (authorBeforeTitle.length > 0) {
                return collectAuthorText(candidates, authorBeforeTitle[0]);
            }

            const authorWindow = candidates.filter(line => (
                line.index > titleIndex &&
                line.index <= titleIndex + 6 &&
                !titleLineIndexes.has(line.index) &&
                looksLikeAuthorLine(line.text)
            ));

            if (authorWindow.length === 0) {
                return '';
            }

            return collectAuthorText(candidates, authorWindow[0]);
        }

        function getTitleLineIndexes(candidates, title) {
            if (!title) return new Set();
            return new Set([
                title.index,
                ...collectAdjacentTitleLines(candidates, title, -1).map(line => line.index),
                ...collectAdjacentTitleLines(candidates, title, 1).map(line => line.index)
            ]);
        }

        function collectAuthorText(candidates, firstAuthorLine) {
            const lines = [firstAuthorLine];
            let nextIndex = firstAuthorLine.index + 1;

            while (lines.length < 4) {
                const next = candidates.find(line => line.index === nextIndex);
                if (!next || !looksLikeAuthorLine(next.text)) break;
                lines.push(next);
                nextIndex += 1;
            }

            return cleanAuthorLine(lines.map(line => trimTerminalPunctuation(line.text)).join(', '));
        }

        function chooseResponsibilityStatement(candidates, titleIndex) {
            const window = candidates.filter(line => (
                line.index > titleIndex &&
                line.index <= titleIndex + 18
            ));

            const direct = window.find(line => looksLikeDirectResponsibilityLine(line.text));
            if (direct) {
                return normalizeResponsibilityStatement(direct.text);
            }

            const byIndex = window.findIndex(line => /^(by|par)$/i.test(cleanFrontMatterLine(line.text)));
            if (byIndex <= 0 || byIndex >= window.length - 1) {
                return '';
            }

            const roleLines = window
                .slice(Math.max(0, byIndex - 6), byIndex)
                .filter(line => looksLikeResponsibilityRoleLine(line.text))
                .map(line => line.text);
            const name = normalizeContributorName(window[byIndex + 1].text);

            if (roleLines.length === 0 || !looksLikeContributorName(name)) {
                return '';
            }

            const connector = /^par$/i.test(cleanFrontMatterLine(window[byIndex].text)) ? 'par' : 'by';
            return cleanCitationText(`${formatResponsibilityRoles(roleLines)} ${connector} ${name}`);
        }

        function chooseSeriesStatement(candidates, titleIndex) {
            const window = candidates.filter(line => (
                line.index >= titleIndex - 8 &&
                line.index <= titleIndex + 8 &&
                looksLikeSeriesLine(line.text)
            ));
            if (window.length === 0) return '';

            const seriesLine = window.find(line => /\bseries\b|sources?\s+chr[ÃĐe]tiennes?/i.test(line.text));
            const numberLine = window.find(line => /^(volume|vol\.?|n[Â°o]|no\.?)\b/i.test(cleanFrontMatterLine(line.text)));

            if (seriesLine && numberLine && seriesLine !== numberLine) {
                return cleanCitationText(`${formatSeriesLine(seriesLine.text)}, ${formatSeriesLine(numberLine.text)}`);
            }

            return formatSeriesLine((seriesLine || numberLine || window[0]).text);
        }

        function chooseEditionStatement(candidates, titleIndex) {
            const edition = candidates.find(line => (
                line.index > titleIndex &&
                line.index <= titleIndex + 10 &&
                looksLikeEditionLine(line.text)
            ));
            return edition ? sentenceCaseText(edition.text) : '';
        }

        function formatSeriesLine(text) {
            const cleaned = cleanFrontMatterLine(text)
                .replace(/^n[Â°o]\s*/i, '')
                .replace(/^no\.?\s*/i, '')
                .replace(/^volume\s+/i, 'volume ')
                .replace(/^vol\.?\s+/i, 'volume ');
            return /^volume\b/i.test(cleaned) || /^\d+$/.test(cleaned)
                ? cleaned.toLocaleLowerCase('en')
                : formatCitationTitle(cleaned);
        }

        function choosePublicationStatement(candidates) {
            const publisherInfo = findPublisherInfo(candidates);
            const year = findPublicationYear(candidates);
            return buildPublicationBlock(publisherInfo.city, publisherInfo.publisher, year);
        }

        function findPublicationYear(candidates) {
            const yearLine = candidates.find(line => /\b(copyright|first printing|published|publication|ÃĐdition|impression)\b/i.test(line.text) && extractYear(line.text)) ||
                candidates.find(line => extractYear(line.text));
            return yearLine ? extractYear(yearLine.text) : '';
        }

        function extractYear(text) {
            const match = String(text || '').match(/\b(1[5-9]\d{2}|20\d{2})\b/);
            return match ? match[1] : '';
        }

        function findPublisherInfo(candidates) {
            let best = { publisher: '', city: '', score: 0 };
            for (const line of candidates) {
                const info = parsePublisherLine(line.text);
                if (info.publisher) {
                    if (!info.city) {
                        const nearbyPlace = candidates
                            .filter(candidate => candidate.index > line.index && candidate.index <= line.index + 4)
                            .map(candidate => findPlaceInText(candidate.text))
                            .find(Boolean);
                        info.city = nearbyPlace || '';
                    }
                    const score = scorePublisherInfo(info, line.text);
                    if (score > best.score) {
                        best = { ...info, score };
                    }
                }
            }
            return { publisher: best.publisher, city: best.city };
        }

        function scorePublisherInfo(info, sourceText) {
            let score = 1;
            if (info.city) score += 3;
            if (/\b(published by|ÃĐditions?|press|publisher|publishing|inc\.?|co\.?|company|sarl|sons?|wiley|jossey|bass|guilford|cerf)\b/i.test(sourceText)) score += 2;
            if (/\b(copyright|ÂĐ)\b/i.test(sourceText)) score += 1;
            if (info.publisher.length > 8) score += 1;
            return score;
        }

        function parsePublisherLine(text) {

            cleaned = cleaned
                .replace(/^copyright\s*ÂĐ?\s*(?:\d{4}\s*)?(?:by\s+)?/i, '')
                .replace(/\b\d{4}\b/g, '')

            if (dashParts.length > 1) {

                    city: findPlaceInText(dashParts.slice(1).join(', '))

            const commaParts = cleaned.split(/\s*,\s*/).map(part => cleanFrontMatterLine(part)).filter(Boolean);
            if (/^published by/i.test(text) && commaParts.length > 1) {
                const publisherPartCount = commaParts.length >= 3 && /\b(inc\.?|co\.?|company|sons?)$/i.test(commaParts[1]) ? 2 : 1;
                return {

                    city: findPlaceInText(commaParts.slice(publisherPartCount).join(', '))

                city: findPlaceInText(cleaned)

        function looksLikePublisherLine(text) {

            if (looksLikeNonPublisherCredit(cleaned)) return false;
            if (/^(?:ë°íėē|ėķíėŽ|íīëļęģģ|íīëļ ęģģ|ėķí|ë°í)\s*[:ïž]?/u.test(cleaned)) return true;
            return /\b(press|publisher|publishers|publishing|university|college|ÃĐditions?|editiones|books?|inc\.?|co\.?|company|sarl|sons?|wiley|jossey|bass|guilford|excelsis|leaders for leaders|hana medical|cerf)\b/i.test(cleaned);
        }

        function normalizePublisherName(text) {
            const cleaned = stripNonTitleLatinBracketedEquivalents(cleanFrontMatterLine(text))
                .replace(/^(?:ë°íėē|ėķíėŽ|íīëļęģģ|íīëļ ęģģ|ėķí|ë°í)\s*[:ïž]?\s*/u, '')
                .replace(/\s+site internet\b.*$/i, '')

                /(?:ęūļë°|ëėėļ|íė§\s*ëėėļ)\s*[:ïž]/u.test(cleaned);

        function findPlaceInText(text) {
            const cleaned = cleanFrontMatterLine(text).replace(/\b[A-Z]\d[A-Z]\s*\d[A-Z]\d\b/ig, '');
            const koreanPlace = cleaned.match(/(?:^|[\s,;:])((?:ėėļ|ėėļė|ëķė°|ëķė°ė|ëęĩŽ|ëęĩŽė|ėļėē|ėļėēė|ęīėĢž|ęīėĢžė|ëė |ëė ė|ėļė°|ėļė°ė|ėļėĒ|ėļėĒė|ė ėĢž|ė ėĢžė|[ę°-íĢ]{2,}(?:ė|ë|ęĩ°)))(?=$|[\s,;:])/u);
            if (koreanPlace) return koreanPlace[1];
            const matches = [...cleaned.matchAll(/\b([\p{Lu}][\p{L}' .-]+,\s*(?:[A-Z]{2}|[\p{Lu}][\p{L}' .-]+|France|Korea|New Jersey))\b/gu)];

            const words = cleaned.replace(/,/g, ' ').split(/\s+/).filter(Boolean);
            if (words.length < 2 || words.length > 5) return false;
            const nameWords = words.filter(word => /^(\p{Lu}[\p{L}'â-]*\.?|[A-Z]\.)$/u.test(word) || /^\p{Ll}{1,3}$/u.test(word));
            const capitalizedWords = words.filter(word => /^(\p{Lu}[\p{L}'â-]*\.?|[A-Z]\.)$/u.test(word));
            return nameWords.length === words.length && capitalizedWords.length >= 2;
        }

        function formatChicagoAuthors(author) {
            const cleaned = cleanAuthorLine(author);
            if (!cleaned) return '';

            const names = splitAuthorNames(cleaned)
                .map(name => normalizeContributorName(name))
                .filter(Boolean);

            if (names.length === 0) return '';

            if (names.length === 1) {
                return punctuateAuthorList(trimAuthorName(invertPersonalName(names[0])));
            }

            const first = trimAuthorName(invertPersonalName(names[0]));
            const rest = names.slice(1).map(trimAuthorName);

            let authorList = '';
            if (rest.length === 1) {
                authorList = first + ', and ' + rest[0];
            } else {
                authorList = first + ', ' + rest.slice(0, -1).join(', ') + ', and ' + rest[rest.length - 1];
            }

            return punctuateAuthorList(authorList);
        }

        function invertPersonalName(name) {
            const cleaned = cleanFrontMatterLine(name);
            if (!cleaned || cleaned.includes(',')) return cleaned;
            if (containsNonLatinScript(cleaned)) return cleaned;

            const parts = cleaned.split(/\s+/);
            if (parts.length < 2) return cleaned;

            const suffixes = ['Jr.', 'Jr', 'Sr.', 'Sr', 'II', 'III', 'IV', 'V'];
            let suffix = '';
            if (suffixes.includes(parts[parts.length - 1])) {
                suffix = parts.pop();
            }

            const last = parts.pop();
            const given = parts.join(' ');
            return last + ', ' + given + (suffix ? ', ' + suffix : '');
        }

        function containsNonLatinScript(text) {
            const cleaned = cleanFrontMatterLine(text);
            return /[\p{L}]/u.test(cleaned) &&
                /[^\p{Script=Latin}\p{Script=Common}\p{Script=Inherited}]/u.test(cleaned);
        }

        function trimTerminalPunctuation(text) {
            return cleanFrontMatterLine(text).replace(/[.,;:]+$/g, '');
        }

        function trimAuthorName(text) {
            return cleanFrontMatterLine(text).replace(/[,;:]+$/g, '');
        }

        function punctuateAuthorList(text) {
            const cleaned = cleanCitationText(text);
            return /[.!?]$/.test(cleaned) ? cleaned : cleaned + '.';
        }

        function formatCitationTitle(title) {
            const cleaned = moveTrailingNonLatinTitleTranslationIntoBrackets(
                mergeSplitNonLatinTitleTranslations(trimTerminalPunctuation(title))
            );
            return cleanCitationText(cleaned.replace(/\b[\p{Lu}][\p{Lu}'â-]{2,}\b/gu, word => {
                if (/^(II|III|IV|IX|VI|VII|VIII|USA|UK|US|PDF|ISBN)$/u.test(word)) return word;
                return word.charAt(0).toLocaleUpperCase('en') + word.slice(1).toLocaleLowerCase('en');
            }));
        }

        function mergeSplitNonLatinTitleTranslations(text) {
            const cleaned = cleanCitationText(text);
            const match = cleaned.match(/^(.+?)\s*\[([^\[\]]+)\]\s*:\s*(.+?)\s*\[([^\[\]]+)\]$/u);
            if (!match) {
                return cleaned;
            }

            const [, sourceMain, translationMain, sourceSubtitle, translationSubtitle] = match;
            if (!containsNonLatinScript(`${sourceMain} ${sourceSubtitle}`)) {
                return cleaned;
            }
            if (containsNonLatinScript(translationMain) || containsNonLatinScript(translationSubtitle)) {
                return cleaned;
            }

            return cleanCitationText(`${sourceMain}: ${sourceSubtitle} [${translationMain}: ${translationSubtitle}]`);
        }

        function moveTrailingNonLatinTitleTranslationIntoBrackets(text) {
            const cleaned = cleanCitationText(text);
            const match = cleaned.match(/^(.+?)\s*\[([^\[\]]+)\]\s*:\s*([^\[\]]+)$/u);
            if (!match) {
                return cleaned;
            }

            const [, sourceTitle, bracketedText, trailingTitle] = match;
            if (!containsNonLatinScript(sourceTitle)) {
                return cleaned;
            }
            if (containsNonLatinScript(bracketedText) || containsNonLatinScript(trailingTitle)) {
                return cleaned;
            }
            if (!looksLikeRomanizedTitle(bracketedText)) {
                return cleaned;
            }

            return cleanCitationText(`${sourceTitle} [${trimTerminalPunctuation(trailingTitle)}]`);
        }

        function looksLikeRomanizedTitle(text) {
            const cleaned = cleanCitationText(text);
            if (!cleaned || containsNonLatinScript(cleaned)) {
                return false;
            }

            const words = cleaned.split(/\s+/).filter(Boolean);
            if (words.length < 2) {
                return false;
            }

            return words.some(word => /^(?:wa|gwa|ui)$/i.test(word)) ||
                /\b[a-z]*(?:yeo|yeong|eong|eon|eo|eu|ae|oe|ui|jeok|jido|mokhoe|ganghae|seolgyo)[a-z]*\b/i.test(cleaned);
        }

        function stripHtml(text) {
            const div = document.createElement('div');
            div.innerHTML = String(text || '');
            return div.textContent || '';
        }

        function isMostlyAllCaps(text) {
            const letters = text.replace(/[^A-Za-z]/g, '');
            if (letters.length < 4) return false;
            const uppercase = letters.replace(/[^A-Z]/g, '').length;
            return uppercase / letters.length > 0.85;
        }

        async function getPageNumber(pdf, item) {
            try {
                let dest = item.dest;
                if (typeof dest === 'string') {
                    dest = await pdf.getDestination(dest);
                }
                if (!dest || !Array.isArray(dest)) return null;
                const pageIndex = await pdf.getPageIndex(dest[0]);
                return pageIndex + 1;
            } catch (e) {
                return null;
            }
        }

        function getChapterUrl(token) {
            const workerUrl = WORKER_URL + '?token=' + encodeURIComponent(token);
            return VIEWER_URL + '?file=' + encodeURIComponent(workerUrl);
        }

        /* ââ Shared CSS block (only in Part 1) ââ */
        function buildStyleBlock(citation) {
            return `<!-- ${escapeHtml(plainCitationText(citation))} - Chapter Links -->
<style>
.dtl-chapters { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
.dtl-chapters-header { background: #f8f9fa; padding: 14px 18px; cursor: pointer; display: flex; align-items: center; gap: 10px; border-radius: 6px; transition: background 0.2s; user-select: none; }
.dtl-chapters-header:hover { background: #f0f0f0; }
.dtl-chapters-arrow { transition: transform 0.2s; font-size: 12px; color: #666; }
.dtl-chapters.open .dtl-chapters-arrow { transform: rotate(90deg); }
.dtl-chapters-citation { font-weight: 600; font-size: 15px; color: #333; }
.dtl-chapters-list { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
.dtl-chapters.open .dtl-chapters-list { max-height: 2000px; }
.dtl-chapters-list ul { list-style: none; padding: 12px 0 12px 28px; margin: 0; }
.dtl-chapters-list li { padding: 8px 0; }
.dtl-chapter-button {
  appearance: none;
  -webkit-appearance: none;
  background: transparent;
  border: 0;
  color: #0061fe !important;
  cursor: pointer;
  display: inline;
  font: inherit;
  font-size: 14px;
  padding: 0;
  text-align: left;
}
.dtl-chapter-button:visited {
  color: #0061fe !important;
}
.dtl-chapter-button:hover,
.dtl-chapter-button:active,
.dtl-chapter-button:focus {
  color: #004bb5 !important;
  text-decoration: none;
}
.dtl-chapter-button:focus { outline: 2px solid #99c2ff; outline-offset: 2px; }
</style>`;
        }

        function buildWrapperOpen(citation, partNum, totalParts) {
            const suffix = totalParts > 1 ? ` (Part ${partNum} of ${totalParts})` : '';
            const citationHtml = formatCitationHtml(citation);
            return `
<div class="dtl-chapters open">
  <div class="dtl-chapters-header" onclick="this.parentElement.classList.toggle('open')" tabindex="0" onkeydown="if(event.key==='Enter' || event.key===' ') { event.preventDefault(); this.click(); }">
    <span class="dtl-chapters-arrow">âķ</span>
    <span class="dtl-chapters-citation">${citationHtml}${suffix}</span>
  </div>
  <div class="dtl-chapters-list">
    <ul>
`;
        }

        const WRAPPER_CLOSE = `    </ul>
  </div>
</div>
<script>
function dtlOpenChapter(button) {
  var url = button && button.getAttribute("data-dtl-url");
  if (!url) return;
  window.location.replace(url);
}
<\/script>`;

        function buildLiHtml(ch, token) {
            const url = getChapterUrl(token);
            return `      <li><button type="button" class="dtl-chapter-button" data-dtl-url="${escapeAttribute(url)}" onclick="dtlOpenChapter(this)" oncontextmenu="return false;">${escapeHtml(ch.title)}</button></li>\n`;
        }

        /* ââ Split chapters into parts of CHAPTERS_PER_PART each ââ */
        const CHAPTERS_PER_PART = 30;

        function splitIntoParts(citation, chapters, tokens) {
            const liStrings = chapters.map((ch, i) => buildLiHtml(ch, tokens[i].token));
            const styleBlock = buildStyleBlock(citation);
            const totalParts = Math.ceil(chapters.length / CHAPTERS_PER_PART);

            const parts = [];
            for (let p = 0; p < totalParts; p++) {
                const start = p * CHAPTERS_PER_PART;
                const end = Math.min(start + CHAPTERS_PER_PART, chapters.length);

                let html = styleBlock + '\n';
                html += buildWrapperOpen(citation, p + 1, totalParts);
                for (let i = start; i < end; i++) {
                    html += liStrings[i];
                }
                html += WRAPPER_CLOSE;

                parts.push({
                    html,
                    chapterCount: end - start,
                    partNumber: p + 1
                });
            }

            return parts;
        }

        function generateOutput(citation, chapters, tokens, totalPages) {
            const parts = splitIntoParts(citation, chapters, tokens);
            generatedParts = parts;

            // Result info
            document.getElementById('resultInfo').innerHTML =
                '<strong>' + chapters.length + ' chapters</strong> extracted from a ' + totalPages + '-page PDF';
            renderReadyCopyActions(parts);

            // Split notice
            const notice = document.getElementById('splitNotice');
            if (parts.length > 1) {
                notice.style.display = 'flex';
                document.getElementById('splitNoticeText').innerHTML =
                    'Output was split into <strong>' + parts.length + ' parts</strong> (' +
                    CHAPTERS_PER_PART + ' chapters each). ' +
                    'Paste each part into a <strong>separate HTML box</strong> on the same page, in order.';
            } else {
                notice.style.display = 'none';
            }

            // Build part blocks
            const container = document.getElementById('partsContainer');
            container.innerHTML = '';

            parts.forEach((part, i) => {
                const block = document.createElement('div');
                block.className = 'part-block';
                block.innerHTML = `
                    <div class="part-block-header">
                        <span class="part-label">${parts.length === 1 ? 'HTML Output' : 'Part ' + part.partNumber + ' of ' + parts.length + ' â ' + part.chapterCount + ' chapters'}</span>
                    </div>
                    <div class="code-output">
                        <pre></pre>
                    </div>
                    <div class="part-actions">
                        <button class="btn-copy-part" onclick="copyPart(${i}, this)">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                            Copy${parts.length > 1 ? ' Part ' + part.partNumber : ''}
                        </button>
                        <span class="copy-confirm" id="copyConfirm${i}">â Copied!</span>
                    </div>
                `;
                // Set code text safely (textContent, not innerHTML)
                block.querySelector('pre').textContent = part.html;
                container.appendChild(block);
            });

            // Preview: combine all parts
            const fullHtml = parts.map(p => p.html).join('\n');
            document.getElementById('previewBox').innerHTML = fullHtml;

            showStatus('', 'success');
            document.getElementById('resultsBody').style.display = 'block';
        }

        function renderReadyCopyActions(parts) {
            const actions = document.getElementById('readyCopyActions');
            actions.innerHTML = '';

            parts.forEach((part, index) => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'btn-copy-ready';
                button.textContent = parts.length === 1 ? 'Copy HTML' : 'Copy Part ' + part.partNumber;
                button.addEventListener('click', () => copyPart(index, button));
                actions.appendChild(button);
            });

            actions.classList.toggle('show', parts.length > 0);
        }

        function copyPart(index, btnElement) {
            const code = generatedParts[index].html;
            navigator.clipboard.writeText(code).then(() => {
                showCopyConfirm(index);
                if (btnElement) showInlineCopyConfirm(btnElement);
            }).catch(() => {
                // Fallback
                const textarea = document.createElement('textarea');
                textarea.value = code;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showCopyConfirm(index);
                if (btnElement) showInlineCopyConfirm(btnElement);
            });
        }

        function copyMetadataField(fieldId, btnElement) {
            const field = document.getElementById(fieldId);
            navigator.clipboard.writeText(field.value).then(() => {
                showInlineCopyConfirm(btnElement);
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = field.value;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showInlineCopyConfirm(btnElement);
            });
        }

        function showInlineCopyConfirm(btnElement) {
            const originalText = btnElement.textContent;
            const originalBackground = btnElement.style.background;
            const originalBorderColor = btnElement.style.borderColor;
            const originalColor = btnElement.style.color;
            btnElement.textContent = 'Copied!';
            btnElement.style.background = '#d1fae5';
            btnElement.style.borderColor = '#10b981';
            btnElement.style.color = '#065f46';

            setTimeout(() => {
                btnElement.textContent = originalText;
                btnElement.style.background = originalBackground;
                btnElement.style.borderColor = originalBorderColor;
                btnElement.style.color = originalColor;
            }, 2000);
        }

        function showCopyConfirm(index) {
            const el = document.getElementById('copyConfirm' + index);
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 2500);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function escapeAttribute(text) {
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/"/g, '&quot;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        document.getElementById('staffPassword').addEventListener('keypress', e => {
            if (e.key === 'Enter') document.getElementById('citation').focus();
        });

        document.getElementById('citation').addEventListener('change', function() {
            if (this.value.trim()) {
                clearCitationAutoFillState();
                const citation = normalizeBibliographyCitation(this.value.trim());
                this.value = citation;
                fillDerivedCitationFields(citation);
            }
        });

        document.getElementById('citation').addEventListener('keypress', e => {
            if (e.key === 'Enter') document.getElementById('dropboxUrl').focus();
        });

        document.getElementById('dropboxUrl').addEventListener('keypress', e => {
            if (e.key === 'Enter') analyzePDF();
        });
    </script>
</body>
</html>
